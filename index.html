<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Weight Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0071e3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Weight Tracker">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<style>
  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --text: #1c1c1e;
    --text-dim: #6c6c70;
    --text-faint: #a1a1a6;
    --accent: #0071e3;
    --accent-dim: #e6f0fb;
    --success: #34c759;
    --success-dim: #e6f8eb;
    --danger: #ff3b30;
    --warn: #ff9500;
    --border: #e5e5ea;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.05);
    --radius: 14px;
    --radius-sm: 10px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
    --tab-h: 64px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    line-height: 1.4;
    min-height: 100vh;
    overscroll-behavior-y: contain;
    touch-action: manipulation;
  }
  #app {
    max-width: 640px;
    margin: 0 auto;
    padding: calc(16px + var(--safe-top)) 16px calc(var(--tab-h) + var(--safe-bottom) + 16px);
  }
  #app.fullscreen {
    padding-bottom: calc(var(--safe-bottom) + 96px);
  }

  /* Typography */
  h1 { font-size: 28px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.02em; }
  h2 { font-size: 20px; font-weight: 600; margin: 24px 0 12px; letter-spacing: -0.01em; }
  h3 { font-size: 17px; font-weight: 600; margin: 0; }
  .subtle { color: var(--text-dim); font-size: 14px; }
  .faint { color: var(--text-faint); font-size: 13px; }
  .mono { font-variant-numeric: tabular-nums; }

  /* Cards */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .card.compact { padding: 12px 16px; }
  .card.flat { box-shadow: none; border: 1px solid var(--border); }
  .row { display: flex; align-items: center; gap: 12px; }
  .row.between { justify-content: space-between; }
  .row.wrap { flex-wrap: wrap; }
  .stack { display: flex; flex-direction: column; gap: 4px; }

  /* Buttons */
  .btn {
    border: none;
    background: var(--accent);
    color: white;
    font-size: 17px;
    font-weight: 600;
    padding: 14px 20px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    width: 100%;
    font-family: inherit;
    transition: opacity 0.15s, transform 0.05s;
  }
  .btn:active { transform: scale(0.98); opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.secondary { background: var(--accent-dim); color: var(--accent); }
  .btn.ghost { background: transparent; color: var(--accent); }
  .btn.danger { background: transparent; color: var(--danger); }
  .btn.success { background: var(--success); }
  .btn.small { padding: 8px 14px; font-size: 14px; width: auto; }
  .btn.icon {
    width: 36px; height: 36px; padding: 0;
    border-radius: 50%; display: inline-flex;
    align-items: center; justify-content: center;
    background: var(--bg); color: var(--text-dim);
    font-size: 18px; font-weight: 400;
  }
  .btn-group { display: flex; gap: 8px; }
  .btn-group .btn { flex: 1; }

  /* Inputs */
  input[type="text"], input[type="number"], input[type="tel"] {
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 16px;
    font-family: inherit;
    width: 100%;
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
  }
  input::placeholder { color: var(--text-faint); }
  label.field { display: block; margin-bottom: 12px; }
  label.field .lbl { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }

  /* Tab bar */
  #tabs {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    height: calc(var(--tab-h) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    z-index: 50;
  }
  #tabs[hidden] { display: none; }
  .tab {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 8px 4px;
    font-family: inherit;
  }
  .tab .ico { font-size: 22px; line-height: 1; }
  .tab.active { color: var(--accent); }

  /* Stat row */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 12px 0 20px;
  }
  .stat {
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat .v { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .stat .k { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }

  /* Progress */
  .progress-bar {
    height: 8px;
    background: var(--bg);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }
  .progress-bar.success .fill { background: var(--success); }

  /* Day list */
  .day-list .day-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--card);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    border: 1px solid transparent;
  }
  .day-list .day-item.current { border-color: var(--accent); background: var(--accent-dim); }
  .day-list .day-item.done .num { background: var(--success); color: white; }
  .day-list .num {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--bg);
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 14px;
    flex-shrink: 0;
  }
  .day-list .day-item.current .num { background: var(--accent); color: white; }
  .day-list .name { flex: 1; font-weight: 500; }
  .day-list .meta { font-size: 13px; color: var(--text-dim); }

  /* Workout view */
  .workout-top {
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    padding-top: var(--safe-top);
    margin: calc(-1 * (16px + var(--safe-top))) -16px 12px;
    padding: calc(12px + var(--safe-top)) 16px 12px;
  }
  .workout-top .row { margin-bottom: 12px; }
  .dots { display: flex; gap: 6px; flex-wrap: wrap; }
  .dot {
    width: 28px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    flex: 1;
    min-width: 16px;
    max-width: 40px;
    cursor: pointer;
  }
  .dot.current { background: var(--accent); }
  .dot.done { background: var(--success); }
  .dot.skipped { background: var(--warn); }

  /* Exercise card */
  .ex-card {
    background: var(--card);
    border-radius: var(--radius);
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: opacity 0.15s;
  }
  .ex-card.pending { opacity: 0.55; }
  .ex-card.done .ex-header { background: var(--success-dim); }
  .ex-card.skipped .ex-header { background: #fff4e5; }
  .ex-card.skipped .check { background: var(--warn); }
  .ex-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ex-header .name { flex: 1; font-weight: 600; font-size: 16px; }
  .ex-header .progress {
    font-size: 13px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .ex-header .check {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--success);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 700;
  }
  .ex-target { font-size: 13px; color: var(--text-dim); padding: 0 16px 12px; }
  .ex-summary { font-size: 13px; color: var(--text-dim); padding: 0 16px 12px; font-variant-numeric: tabular-nums; }
  .skip-ex-btn { flex-shrink: 0; }

  /* Set rows */
  .sets { padding: 0 12px 12px; }
  .set-row {
    display: grid;
    grid-template-columns: 48px 1fr 1fr 56px;
    gap: 8px;
    align-items: center;
    padding: 10px 4px;
    border-top: 1px solid var(--border);
  }
  .set-row:first-child { border-top: none; }
  .set-row .lbl { font-size: 13px; color: var(--text-dim); font-weight: 600; }
  .set-row.logged {
    color: var(--text);
  }
  .set-row.logged .val {
    font-size: 16px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .set-row.logged .lbl { color: var(--success); }
  .set-row.pending { color: var(--text-faint); }
  .set-row.pending .val {
    font-size: 14px;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
  }
  .set-row.active input,
  .set-row.editing input {
    height: 44px;
    padding: 0 12px;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    background: var(--bg);
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    box-sizing: border-box;
  }
  .set-row.active .log-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    height: 44px;
    font-size: 20px;
    cursor: pointer;
    font-weight: 700;
    box-sizing: border-box;
  }
  .set-row.active .log-btn:disabled {
    background: var(--border);
    color: var(--text-faint);
  }
  .set-row.logged {
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s ease;
    border-radius: var(--radius-sm);
  }
  .set-row.logged:active { background: var(--bg); }
  .edit-set-btn {
    color: var(--text-faint);
    font-size: 18px;
    justify-self: end;
    pointer-events: none;
  }
  .set-row.editing {
    grid-template-columns: 48px 1fr 1fr 96px;
    background: var(--accent-dim);
    border-radius: var(--radius-sm);
    padding: 8px;
  }
  .set-row.editing .edit-actions {
    display: flex;
    gap: 4px;
  }
  .set-row.editing .edit-actions .log-btn,
  .set-row.editing .edit-actions .cancel-btn {
    flex: 1;
    border: none;
    border-radius: var(--radius-sm);
    height: 44px;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    box-sizing: border-box;
  }
  .set-row.editing .edit-actions .log-btn {
    background: var(--accent);
    color: white;
  }
  .set-row.editing .edit-actions .log-btn:disabled {
    background: var(--border);
    color: var(--text-faint);
  }
  .set-row.editing .edit-actions .cancel-btn {
    background: white;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .last-ref {
    grid-column: 2 / 5;
    margin-top: -4px;
    padding-bottom: 8px;
  }
  .last-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    color: var(--text-dim);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
  }
  .last-chip.static { cursor: default; }
  .last-chip .copy { color: var(--accent); font-weight: 600; }

  /* Compact reps stepper in workout set rows */
  .set-row .reps-stepper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 44px;
    background: var(--bg);
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    padding: 2px;
    min-width: 0;
    box-sizing: border-box;
  }
  .set-row .reps-stepper .step-btn {
    width: 40px; height: 38px;
    font-size: 20px;
    color: var(--accent);
    background: transparent;
    border: none;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
    cursor: pointer;
  }
  .set-row .reps-stepper .step-btn:active { background: var(--accent-dim); }
  .set-row .reps-stepper .step-val {
    flex: 1;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    min-width: 24px;
  }
  .set-row.editing .reps-stepper {
    background: white;
  }

  /* Bottom bar in workout */
  .workout-bottom {
    position: fixed;
    bottom: var(--safe-bottom);
    left: 0; right: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    z-index: 40;
  }
  .workout-bottom-inner { max-width: 640px; margin: 0 auto; }

  /* Setup */
  .day-editor {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .ex-editor {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 8px;
  }
  .ex-editor-top {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .ex-editor-top .exname { flex: 1; padding: 10px 12px; font-size: 15px; }
  .ex-editor-bottom {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }
  .ex-editor .remove {
    background: transparent;
    border: none;
    color: var(--danger);
    font-size: 22px;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    min-width: 36px;
    min-height: 36px;
  }
  .stepper-group {
    flex: 1;
    min-width: 0;
  }
  .stepper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px;
    min-width: 0;
  }
  .stepper.big { padding: 6px; }
  .stepper-label {
    display: block;
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 600;
    margin: 0 0 4px 4px;
  }
  .step-btn {
    width: 36px; height: 36px;
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 22px;
    font-weight: 600;
    cursor: pointer;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
  }
  .step-btn:active { background: var(--accent-dim); }
  .step-val {
    flex: 1;
    min-width: 28px;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  /* placeholder for old style — no longer used but kept harmless */
  .ex-editor-head {
    display: none;
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    padding: 0 4px;
  }

  /* Celebration */
  .celebrate {
    text-align: center;
    padding: 40px 20px;
  }
  .celebrate .big {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: var(--success);
    color: white;
    display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 44px;
    margin-bottom: 20px;
    animation: pop 0.4s ease-out;
  }
  .celebrate h1 { font-size: 32px; margin-bottom: 8px; }
  .celebrate .sub { color: var(--text-dim); margin-bottom: 24px; }

  /* Week progression timeline on celebration */
  .week-timeline {
    max-width: 360px;
    margin: 8px auto 24px;
    padding: 0 8px;
  }
  .week-tl-row {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .week-tl-node {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--card);
    color: var(--text-faint);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .week-tl-node.done {
    background: var(--success);
    border-color: var(--success);
    color: white;
  }
  .week-tl-node.animate-in {
    animation: tl-pop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
  }
  .week-tl-line {
    flex: 1;
    height: 2px;
    background: var(--border);
    transition: background 0.3s ease;
  }
  .week-tl-line.filled { background: var(--success); }
  .week-tl-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
  }
  .week-tl-name {
    width: 44px;
    text-align: center;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
    color: var(--text-faint);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .week-tl-name.done { color: var(--text); }
  .week-tl-caption {
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  @keyframes tl-pop {
    0%   { transform: scale(0.4); opacity: 0; }
    60%  { transform: scale(1.18); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .reward-row {
    display: flex; justify-content: center; gap: 12px;
    margin: 20px 0;
  }
  .reward {
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px 18px;
    box-shadow: var(--shadow);
    font-weight: 600;
    font-size: 15px;
    animation: slideup 0.5s ease-out;
  }
  .reward .label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; margin-bottom: 2px; }
  @keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  @keyframes slideup {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* History */
  .session-item {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
  }
  .session-item .session-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 6px;
  }
  .session-item .session-head .ttl { font-weight: 600; }
  .session-item details summary {
    cursor: pointer;
    color: var(--accent);
    font-size: 13px;
    list-style: none;
    margin-top: 8px;
  }
  .session-item details summary::-webkit-details-marker { display: none; }
  .session-item .ex-detail {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 14px;
  }
  .session-item .ex-detail .nm { font-weight: 500; }
  .session-item .ex-detail .sts { color: var(--text-dim); font-variant-numeric: tabular-nums; font-size: 13px; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty .ico {
    font-size: 56px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }
  .modal h3 { margin-bottom: 8px; }
  .modal p { color: var(--text-dim); margin: 0 0 20px; }
  .modal .btn-group { margin-top: 12px; }
  .modal-extra {
    display: block;

<body>
<div id="app"></div>
<nav id="tabs" hidden>
  <button class="tab" data-tab="today"><span class="ico">⌂</span><span>Today</span></button>
  <button class="tab" data-tab="program"><span class="ico">⚙</span><span>Settings</span></button>

<script>
'use strict';

/* ---------- State ---------- */
const APP_VERSION = 'v19 · today stepper';

const EXERCISE_LIBRARY = [
  // Squat / quad
  'Back Squat', 'Front Squat', 'Goblet Squat', 'Hack Squat', 'Bulgarian Split Squat',
  'Leg Press', 'Lunge', 'Walking Lunge', 'Step-Up', 'Leg Extension',
  // Hinge / posterior chain
  'Deadlift', 'Romanian Deadlift', 'Sumo Deadlift', 'Stiff-Leg Deadlift',
  'Hip Thrust', 'Glute Bridge', 'Good Morning', 'Leg Curl', 'Kettlebell Swing',
  // Calves
  'Standing Calf Raise', 'Seated Calf Raise',
  // Push horizontal
  'Bench Press', 'Incline Bench Press', 'Decline Bench Press', 'Close-Grip Bench Press',
  'Dumbbell Bench Press', 'Incline Dumbbell Press', 'Dumbbell Fly', 'Cable Fly',
  'Dumbbell Pullover', 'Push-Up', 'Diamond Push-Up', 'Dip',
  // Pull horizontal
  'Bent-Over Row', 'Pendlay Row', 'T-Bar Row', 'Seated Cable Row', 'Dumbbell Row',
  'Inverted Row', 'Chest-Supported Row', 'Face Pull',
  // Pull vertical
  'Pull-Up', 'Chin-Up', 'Lat Pulldown', 'Straight-Arm Pulldown',
  // Shoulders
  'Overhead Press', 'Dumbbell Shoulder Press', 'Arnold Press', 'Push Press',
  'Lateral Raise', 'Cable Lateral Raise', 'Front Raise', 'Rear Delt Fly',
  'Upright Row', 'Shrug',
  // Biceps
  'Barbell Curl', 'EZ-Bar Curl', 'Dumbbell Curl', 'Hammer Curl',
  'Preacher Curl', 'Cable Curl', 'Concentration Curl', 'Incline Dumbbell Curl',
  // Triceps
  'Tricep Pushdown', 'Skull Crusher', 'Overhead Tricep Extension',
  'Tricep Dip', 'Tricep Kickback', 'Cable Overhead Extension',
  // Core
  'Plank', 'Side Plank', 'Hanging Leg Raise', 'Cable Crunch', 'Russian Twist',
  'Ab Wheel Rollout', 'Sit-Up', 'Crunch', 'Mountain Climber', 'Pallof Press',
  // Olympic / total body
  'Power Clean', 'Clean and Press', 'Snatch', 'Farmer’s Walk', 'Turkish Get-Up'
];
const STORAGE_KEY = 'wt-state-v2';
let saveErrorShown = false;
const DEFAULT_STATE = {
  program: null,        // { name, weeks: 8, template: [{ name, exercises: [{ name, sets, reps }] }] }
  programLibrary: [],   // [{ id, name, weeks, template, archived, createdAt, updatedAt }]
  activeProgramId: null,
  sessions: [],         // [{ date, weekIndex, dayIndex, dayName, durationMs, exercises: [{ name, sets: [{ weight, reps, ts }], skipped }] }]
  exerciseLibrary: makeInitialExerciseLibrary(),
  active: null,         // { weekIndex, dayIndex, dayName, startedAt, exercises: [...] }
  stats: { xp: 0, streak: 0, lastDayCompleteDate: null },
  currentRun: { startedAt: null, weekIndex: 0, completedDayIndices: [] },
  tab: 'today',
  celebration: null     // { type: 'workout', dayName, weekIndex, setCount, volume, xpEarned, leveledUp, fullyComplete, weekComplete, programComplete }
};

let state = load();
let setupDraft = null;  // { name, weeks, days: [...] } while editing in setup screen
let editingSet = null;  // { exIdx, setIdx } when a logged set is being edited
let selectedWeekIndex = null; // UI-only selected week on Today
let expandedDayKey = null;    // UI-only expanded Today day, formatted as "week:day"
let exerciseLibrarySearch = '';
let editingExerciseLibraryId = null;
let modal = null;

function slugifyExerciseName(name) {
  return String(name || '')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '') || 'exercise';
}

function makeExerciseLibraryEntry(name, builtIn = false) {
  const clean = String(name || '').trim();
  return {
    id: builtIn ? `builtin-${slugifyExerciseName(clean)}` : `custom-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
    name: clean,
    builtIn,
    archived: false
  };
}

function makeInitialExerciseLibrary() {
  return EXERCISE_LIBRARY.map(name => makeExerciseLibraryEntry(name, true));
}

function makeProgramId(name) {
  return `program-${slugifyExerciseName(name)}-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
}

function makeProgramRecord(program, existing = {}) {
  const now = Date.now();
  return {
    id: existing.id || makeProgramId(program.name),
    name: String(program.name || '').trim() || 'My Program',
    weeks: Math.max(1, parseInt(program.weeks, 10) || 1),
    template: structuredClone(program.template || []),
    archived: !!existing.archived,
    createdAt: existing.createdAt || now,
    updatedAt: now
  };
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return migrate(Object.assign(structuredClone(DEFAULT_STATE), JSON.parse(raw)));
  } catch (e) { console.warn('load failed', e); }
  return structuredClone(DEFAULT_STATE);
}

function migrate(s) {
  s.exerciseLibrary = normalizeExerciseLibrary(s);
  s.programLibrary = normalizeProgramLibrary(s);
  if (!s.activeProgramId && s.programLibrary.length) {
    s.activeProgramId = s.programLibrary.find(p => !p.archived)?.id || null;
  }
  if (!s.program && s.activeProgramId) {
    const active = s.programLibrary.find(p => p.id === s.activeProgramId && !p.archived);
    if (active) s.program = programFromRecord(active);
  }
  if (!s.program) return s;
  // Old program shape: { name, days: [...] } → { name, weeks: 1, template: [...] }
  if (s.program.days && !s.program.template) {
    s.program = {
      name: s.program.name,
      weeks: 1,
      template: s.program.days
    };
  }
  // Normalize currentRun shape
  const cr = s.currentRun || {};
  const newCR = {
    startedAt: cr.startedAt || Date.now(),
    weekIndex: typeof cr.weekIndex === 'number' ? cr.weekIndex : 0,
    completedDayIndices: Array.isArray(cr.completedDayIndices) ? cr.completedDayIndices : []
  };
  // Migrate old completedDayCount → weekIndex/completedDayIndices
  if (typeof cr.completedDayCount === 'number' && !Array.isArray(cr.completedDayIndices)) {
    const dayCount = s.program.template.length;
    const fullWeeks = Math.floor(cr.completedDayCount / dayCount);
    const remainder = cr.completedDayCount % dayCount;
    newCR.weekIndex = fullWeeks;
    newCR.completedDayIndices = Array.from({ length: remainder }, (_, i) => i);
  }
  s.currentRun = newCR;
  s.programLibrary = normalizeProgramLibrary(s);
  if (!s.activeProgramId && s.programLibrary.length) {
    s.activeProgramId = s.programLibrary.find(p => !p.archived)?.id || null;
  }
  // Ensure sessions have weekIndex
  if (Array.isArray(s.sessions)) {
    s.sessions.forEach(sess => { if (sess.weekIndex == null) sess.weekIndex = 0; });
  }
  s.exerciseLibrary = normalizeExerciseLibrary(s);
  return s;
}

function programFromRecord(record) {
  return {
    name: record.name,
    weeks: record.weeks,
    template: structuredClone(record.template || [])
  };
}

function normalizeProgramLibrary(s) {
  const byId = new Map();
  const add = (program, existing = {}) => {
    if (!program) return;
    const record = makeProgramRecord(program, existing);
    byId.set(record.id, record);
  };

  if (Array.isArray(s.programLibrary)) {
    s.programLibrary.forEach(p => add(p, p));
  }
  if (s.program) {
    const existingActive = s.activeProgramId && byId.get(s.activeProgramId);
    add(s.program, existingActive || { id: s.activeProgramId || undefined });
  }
  return Array.from(byId.values())
    .filter(p => !p.archived)
    .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
}

function normalizeExerciseLibrary(s) {
  const byName = new Map();
  const add = (entry, opts = {}) => {
    const name = String(entry && entry.name || '').trim();
    if (!name) return;
    const key = name.toLowerCase();
    if (byName.has(key)) {
      const existing = byName.get(key);
      existing.builtIn = existing.builtIn || !!entry.builtIn;
      if (!opts.keepArchive) existing.archived = existing.archived && !!entry.archived;
      return;
    }
    byName.set(key, {
      id: entry.id || (entry.builtIn ? `builtin-${slugifyExerciseName(name)}` : `custom-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`),
      name,
      builtIn: !!entry.builtIn,
      archived: !!entry.archived
    });
  };

  if (Array.isArray(s.exerciseLibrary)) s.exerciseLibrary.forEach(add);
  makeInitialExerciseLibrary().forEach(entry => add(entry, { keepArchive: true }));
  if (Array.isArray(s.programLibrary)) {
    s.programLibrary.forEach(p => (p.template || []).forEach(d => d.exercises.forEach(e => add(makeExerciseLibraryEntry(e.name, false), { keepArchive: true }))));
  }
  if (s.program && Array.isArray(s.program.template)) {
    s.program.template.forEach(d => d.exercises.forEach(e => add(makeExerciseLibraryEntry(e.name, false), { keepArchive: true })));
  }
  if (Array.isArray(s.sessions)) {
    s.sessions.forEach(sess => sess.exercises.forEach(e => add(makeExerciseLibraryEntry(e.name, false), { keepArchive: true })));
  }
  return Array.from(byName.values()).sort((a, b) => a.name.localeCompare(b.name));
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    // Verify it actually persisted (some browsers silently accept then drop)
    const check = localStorage.getItem(STORAGE_KEY);
    if (!check) throw new Error('write succeeded but read returned empty');
    return true;
  } catch (e) {
    console.error('save failed', e);
    if (!saveErrorShown) {
      saveErrorShown = true;
      showModal({
        title: 'Could not save your data',
        body: 'Your browser is blocking storage. Common causes: Private/Incognito mode, "Block All Cookies", or full storage. Your changes won\'t persist across reloads until this is fixed.\n\nError: ' + (e.message || String(e)),
        confirmText: 'OK',
        hideCancel: true,
        onConfirm: closeModal
      });
    }
    return false;
  }
}

function buzz(pattern) {
  // No-op on iOS Safari (Vibration API unsupported). Works on Android Chrome / many PWAs.
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) {}
}

function storageWorks() {
  try {
    const k = '__wt_test__';
    localStorage.setItem(k, '1');
    const ok = localStorage.getItem(k) === '1';
    localStorage.removeItem(k);
    return ok;
  } catch (e) {
    return false;
  }
}

function setState(patch) {
  Object.assign(state, patch);
  save();
  render();
}

/* ---------- Helpers ---------- */
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtNum = n => {
  if (n == null || isNaN(n)) return '–';
  const r = Math.round(n * 10) / 10;
  return r % 1 === 0 ? String(r) : r.toFixed(1);
};
const fmtDate = ts => {
  const d = new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  const isYesterday = d.toDateString() === yesterday.toDateString();
  if (sameDay) return 'Today';
  if (isYesterday) return 'Yesterday';
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
};
const daysBetween = (a, b) => {
  const d1 = new Date(new Date(a).toDateString());
  const d2 = new Date(new Date(b).toDateString());
  return Math.round((d2 - d1) / 86400000);
};

function totalVolume(exercises) {
  let v = 0;
  exercises.forEach(e => e.sets.forEach(s => v += (s.weight || 0) * (s.reps || 0)));
  return v;
}
function setCount(exercises) {
  return exercises.reduce((n, e) => n + e.sets.length, 0);
}
function exerciseIsComplete(ex) {
  return ex.sets.length >= ex.targetSets;
}
function exerciseIsResolved(ex) {
  return exerciseIsComplete(ex) || !!ex.skipped;
}
function skippedCount(exercises) {
  return exercises.filter(e => e.skipped).length;
}
function workoutSummaryText(setCountVal, volume, skippedCountVal) {
  const parts = [`${setCountVal} sets`, `${fmtNum(volume)} kg`];
  if (skippedCountVal) parts.push(`${skippedCountVal} skipped`);
  return parts.join(' · ');
}
function levelFromXp(xp) {
  return Math.floor(Math.sqrt(xp / 100));
}
function xpForLevel(lvl) {
  return lvl * lvl * 100;
}

function findLastSet(exerciseName, setIndex) {
  for (let i = state.sessions.length - 1; i >= 0; i--) {
    const ex = state.sessions[i].exercises.find(e => e.name === exerciseName);
    if (ex && ex.sets[setIndex]) return ex.sets[setIndex];
  }
  return null;
}

function weightPrefillFor(ex, si) {
  // Set 2+: take the weight from the previous set in this workout
  if (si > 0 && ex.sets[si - 1]) return ex.sets[si - 1].weight;
  // Set 1: take the weight from the most recent matching set in history (if any)
  const last = findLastSet(ex.name, 0);
  return last ? last.weight : '';
}

function sessionExerciseStatus(ex) {
  const sets = ex.sets.length;
  if (ex.skipped) {
    return sets
      ? `${sets} set${sets === 1 ? '' : 's'} · skipped rest`
      : 'Skipped';
  }
  return `${sets} set${sets === 1 ? '' : 's'}`;
}

function sessionExerciseSetSummary(ex) {
  if (!ex.sets.length) return ex.skipped ? 'No sets logged' : '';
  return ex.sets.map(st => `${fmtNum(st.weight)}kg × ${st.reps}`).join(' · ');
}

function repsPrefillFor(ex, si) {
  // Set 2+: take the reps from the previous set in this workout
  if (si > 0 && ex.sets[si - 1]) return ex.sets[si - 1].reps;
  // Set 1: use the program's target reps
  return ex.targetReps;
}

function currentWeekIndex() {
  if (!state.program) return 0;
  return Math.min(state.currentRun.weekIndex || 0, Math.max(0, state.program.weeks - 1));
}

function clampWeekIndex(weekIndex) {
  if (!state.program) return 0;
  const max = Math.max(0, state.program.weeks - 1);
  const n = parseInt(weekIndex, 10);
  if (isNaN(n)) return currentWeekIndex();
  return Math.max(0, Math.min(max, n));
}

function dayKey(weekIndex, dayIndex) {
  return `${weekIndex}:${dayIndex}`;
}

function sessionBelongsToActiveProgram(session) {
  if (!session) return false;
  if (!state.activeProgramId) return true;
  return !session.programId || session.programId === state.activeProgramId;
}

function activeProgramSessions() {
  return state.sessions.filter(sessionBelongsToActiveProgram);
}

function sessionsForWeek(weekIndex) {
  return activeProgramSessions().filter(s => s.weekIndex === weekIndex);
}

function sessionForDay(weekIndex, dayIndex) {
  return activeProgramSessions().slice().reverse().find(s =>
    s.weekIndex === weekIndex && s.dayIndex === dayIndex
  );
}

function dayIsDoneInWeek(weekIndex, dayIndex) {
  if (!state.program) return false;
  if ((state.currentRun.weekIndex || 0) > weekIndex) return true;
  if ((state.currentRun.weekIndex || 0) === weekIndex) {
    return state.currentRun.completedDayIndices.includes(dayIndex);
  }
  return false;
}

function dayIsDoneThisWeek(dayIndex) {
  return dayIsDoneInWeek(state.currentRun.weekIndex || 0, dayIndex);
}

function nextDayIndex() {
  if (!state.program || programIsComplete()) return -1;
  for (let i = 0; i < state.program.template.length; i++) {
    if (!dayIsDoneThisWeek(i)) return i;
  }
  return -1;
}

function weekIsComplete() {
  return state.program && state.currentRun.completedDayIndices.length >= state.program.template.length;
}

function programIsComplete() {
  return state.program && (state.currentRun.weekIndex || 0) >= state.program.weeks;
}

function sessionForDayThisWeek(dayIndex) {
  return sessionForDay(state.currentRun.weekIndex || 0, dayIndex);
}

function latestSessionThisWeek() {
  return activeProgramSessions().slice().reverse().find(s =>
    s.weekIndex === (state.currentRun.weekIndex || 0) &&
    state.currentRun.completedDayIndices.includes(s.dayIndex)
  );
}

function completedDayCountForWeek(weekIndex) {
  if (!state.program) return 0;
  if ((state.currentRun.weekIndex || 0) > weekIndex) return state.program.template.length;
  if ((state.currentRun.weekIndex || 0) === weekIndex) return state.currentRun.completedDayIndices.length;
  return 0;
}

function activeDayIndexForWeek(weekIndex) {
  if (programIsComplete()) return -1;
  if ((state.currentRun.weekIndex || 0) !== weekIndex) return -1;
  return nextDayIndex();
}

function defaultExpandedDayKey(weekIndex) {
  if (!state.program || !state.program.template.length) return null;
  const activeIdx = activeDayIndexForWeek(weekIndex);
  if (activeIdx >= 0) return dayKey(weekIndex, activeIdx);
  for (let i = 0; i < state.program.template.length; i++) {
    if (dayIsDoneInWeek(weekIndex, i)) return dayKey(weekIndex, i);
  }
  return dayKey(weekIndex, 0);
}

function ensureTodaySelection() {
  if (!state.program) {
    selectedWeekIndex = null;
    expandedDayKey = null;
    return 0;
  }
  selectedWeekIndex = clampWeekIndex(selectedWeekIndex == null ? currentWeekIndex() : selectedWeekIndex);
  if (!expandedDayKey || !expandedDayKey.startsWith(`${selectedWeekIndex}:`)) {
    expandedDayKey = defaultExpandedDayKey(selectedWeekIndex);
  }
  return selectedWeekIndex;
}

function sessionSummaryText(session) {
  if (!session) return 'Done';
  return workoutSummaryText(
    setCount(session.exercises),
    totalVolume(session.exercises),
    skippedCount(session.exercises)
  );
}

/* ---------- Routing ---------- */
function pickView() {
  if (state.celebration) return 'celebration';
  if (!state.program || state.editing) return 'setup';
  if (state.active) return 'workout';
  return state.tab;
}

function render() {
  const view = pickView();
  const app = $('#app');
  const tabs = $('#tabs');
  let body = (Views[view] || Views.today)();
  if (view !== 'workout') {
    body += `<div class="version-stamp">${APP_VERSION}</div>`;
  }
  app.innerHTML = body;
  app.classList.toggle('fullscreen', view === 'workout');
  const showTabs = view === 'today' || view === 'program' || view === 'history';
  tabs.hidden = !showTabs;
  if (showTabs) {
    $$('.tab', tabs).forEach(t => t.classList.toggle('active', t.dataset.tab === state.tab));
  }
  if (modal) renderModal();
  // Scroll to top on view change (but not for active workout re-renders)
  if (view !== 'workout') window.scrollTo(0, 0);
}

function exerciseNameSuggestions() {

function activeProgramLibrary() {
  state.programLibrary = normalizeProgramLibrary(state);
  return state.programLibrary
    .filter(p => !p.archived)
    .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
}

function findProgramRecord(id) {
  state.programLibrary = normalizeProgramLibrary(state);
  return state.programLibrary.find(p => p.id === id && !p.archived);
}

function setActiveProgram(id, opts = {}) {
  const record = findProgramRecord(id);
  if (!record) return false;
  const sameProgram = state.activeProgramId === id;
  state.activeProgramId = id;
  state.program = programFromRecord(record);
  state.active = null;
  state.celebration = null;
  selectedWeekIndex = null;
  expandedDayKey = null;
  if (!sameProgram || opts.resetProgress) {
    state.currentRun = { startedAt: Date.now(), weekIndex: 0, completedDayIndices: [] };
  } else {
    state.currentRun.weekIndex = Math.min(state.currentRun.weekIndex, state.program.weeks);
    state.currentRun.completedDayIndices = state.currentRun.completedDayIndices.filter(i => i < state.program.template.length);
  }
  return true;
}

function activeExerciseLibrary() {
  state.exerciseLibrary = normalizeExerciseLibrary(state);
  return state.exerciseLibrary
    .filter(e => !e.archived)
    .sort((a, b) => a.name.localeCompare(b.name));
}

function ensureExerciseInLibrary(name) {
  const clean = String(name || '').trim();
  if (!clean) return null;
  state.exerciseLibrary = normalizeExerciseLibrary(state);
  const existing = state.exerciseLibrary.find(e => e.name.toLowerCase() === clean.toLowerCase());
  if (existing) {
    existing.archived = false;
    return existing;
  }
  const entry = makeExerciseLibraryEntry(clean, false);
  state.exerciseLibrary.push(entry);
  state.exerciseLibrary.sort((a, b) => a.name.localeCompare(b.name));
  return entry;
}

function exerciseUsedInCurrentProgram(name) {
  if (!state.program) return false;
  const key = String(name || '').trim().toLowerCase();
  return state.program.template.some(d => d.exercises.some(e => e.name.toLowerCase() === key));
}

function updateProgramExerciseName(oldName, newName) {
  const oldKey = String(oldName || '').trim().toLowerCase();
  const updateTemplate = (template) => template.forEach(d => {
    d.exercises.forEach(e => {
      if (e.name.toLowerCase() === oldKey) e.name = newName;
    });
  });
  if (state.program) updateTemplate(state.program.template);
  if (Array.isArray(state.programLibrary)) {
    state.programLibrary.forEach(p => updateTemplate(p.template || []));
  }
}

Views.today = function() {
  const lvl = levelFromXp(state.stats.xp);
  const program = state.program;
  const totalWeeks = program.weeks;
  const template = program.template;
  const selectedWeek = ensureTodaySelection();
  const completedWeeks = Math.min(state.currentRun.weekIndex || 0, totalWeeks);
  const activeWeekDone = programIsComplete() ? 0 : state.currentRun.completedDayIndices.length;
  const overallDone = completedWeeks * template.length + activeWeekDone;
  const overallTotal = Math.max(1, totalWeeks * template.length);
  const overallPct = Math.min(100, Math.round(overallDone / overallTotal * 100));

  return `
    <div class="today-header">
      <h1>Today</h1>
      <button class="btn ghost small" id="edit-program">Edit program</button>
    </div>

    ${programIsComplete() ? programCompleteBannerHtml(program) : ''}
    ${programStatusHtml(program, selectedWeek, totalWeeks, overallPct, lvl)}

    ${selectedWeekDayStepperHtml(selectedWeek)}
  `;
};

      : 'Planned';
  return `
    <div class="card day-stepper-card">
      <div class="week-detail-head">
        <div>
          <div class="section-label">Week ${weekIndex + 1}</div>
          <h2>${status}</h2>
        </div>
        <span class="badge ${status === 'Complete' ? 'success' : ''}">${complete}/${days.length} days</span>
      </div>
      <div class="day-stepper">
        ${days.map((day, i) => dayStepHtml(day, weekIndex, i)).join('')}
      </div>
    </div>
  `;
}

function dayStepHtml(day, weekIndex, dayIndex) {
  const key = dayKey(weekIndex, dayIndex);
  const done = dayIsDoneInWeek(weekIndex, dayIndex);
  const active = !done && activeDayIndexForWeek(weekIndex) === dayIndex;
  const expanded = expandedDayKey === key;
  const session = sessionForDay(weekIndex, dayIndex);
  const skipped = session ? skippedCount(session.exercises) : 0;
  const exCount = day.exercises.length;
  const setCount = day.exercises.reduce((n, e) => n + e.sets, 0);
  const canStart = active && !state.active;
  const statusText = done
    ? (session ? `Done ${fmtDate(session.date)} &middot; ${sessionSummaryText(session)}` : 'Done')
    : active
      ? 'Active day'
      : `${exCount} exercises &middot; ${setCount} sets`;
  const badge = done
    ? (skipped ? `<span class="badge warn">${skipped} skipped</span>` : `<span class="badge success">Done</span>`)
    : active
      ? `<span class="badge success">Active</span>`
      : `<span class="badge">Planned</span>`;

  return `
    <div class="day-step ${done ? 'completed' : ''} ${active ? 'active' : ''} ${expanded ? 'expanded' : ''}">
      <div class="day-step-rail">
        <button class="day-step-circle" data-expand-day-key="${key}" aria-label="Toggle Day ${dayIndex + 1}">
          ${done ? '&#10003;' : dayIndex + 1}
        </button>
      </div>
      <div class="day-step-body">
        <button class="day-step-summary" data-expand-day-key="${key}">
          <div class="day-step-copy">
            <div class="day-step-eyebrow">Day ${dayIndex + 1}</div>
            <div class="day-step-name">${esc(day.name)}</div>
            <div class="day-step-meta">${statusText}</div>
          </div>
          ${badge}
          <span class="chevron" aria-hidden="true">${expanded ? '&#9662;' : '&#9656;'}</span>
        </button>
        ${expanded ? dayStepDetailHtml(day, weekIndex, dayIndex, session, canStart) : ''}
      </div>
    </div>
  `;
}

function dayStepDetailHtml(day, weekIndex, dayIndex, session, canStart) {
  return `
    <div class="day-step-detail">
      ${exerciseStepperHtml(day, weekIndex, dayIndex, session)}
      ${canStart ? `<button class="btn" data-start-day="${dayIndex}">Start ${esc(day.name)}</button>` : ''}
    </div>
  `;
}

function matchingSessionExercise(session, planned, index, used) {
  if (!session || !Array.isArray(session.exercises)) return null;
  const sameIndex = session.exercises[index];
  if (sameIndex && !used.has(index) && sameIndex.name === planned.name) {
    used.add(index);
    return sameIndex;
  }
  const matchIndex = session.exercises.findIndex((e, i) => !used.has(i) && e.name === planned.name);
  if (matchIndex >= 0) {
    used.add(matchIndex);
    return session.exercises[matchIndex];
  }
  return null;
}

function exerciseStepperHtml(day, weekIndex, dayIndex, session) {
  const activeWorkout = state.active &&
    state.active.weekIndex === weekIndex &&
    state.active.dayIndex === dayIndex
      ? state.active
      : null;
  const firstOpen = activeWorkout
    ? activeWorkout.exercises.findIndex(e => !exerciseIsResolved(e))
    : -1;
  const usedSessionExercises = new Set();

  return `
    <div class="exercise-stepper">
      ${day.exercises.map((planned, i) => {
        const activeEx = activeWorkout ? activeWorkout.exercises[i] : null;
        const sessionEx = activeEx ? null : matchingSessionExercise(session, planned, i, usedSessionExercises);
        const source = activeEx || sessionEx || planned;
        const targetSets = source.targetSets || planned.sets;
        const targetReps = source.targetReps || planned.reps;
        let status = 'blank';
        if (activeEx) {
          if (activeEx.skipped) status = 'skipped';
          else if (exerciseIsComplete(activeEx)) status = 'completed';
          else if (i === firstOpen) status = 'active';
        } else if (sessionEx) {
          const sessionSets = Array.isArray(sessionEx.sets) ? sessionEx.sets.length : 0;
          const sessionTarget = sessionEx.targetSets || planned.sets;
          status = sessionEx.skipped ? 'skipped' : sessionSets >= sessionTarget ? 'completed' : 'blank';
        }
        const loggedSummary = sessionEx
          ? sessionExerciseSetSummary(sessionEx) || sessionExerciseStatus(sessionEx)
          : activeEx && activeEx.sets.length
            ? `${activeEx.sets.length} of ${targetSets} sets logged`
            : '';
        return `
          <div class="exercise-step ${status}">
            <span class="exercise-step-dot">${status === 'completed' || status === 'skipped' ? '&#10003;' : ''}</span>
            <div class="exercise-step-main">
              <div class="exercise-step-name">${esc(planned.name)}</div>
              <div class="exercise-step-meta">${targetSets}&times;${targetReps}${loggedSummary ? ` &middot; ${esc(loggedSummary)}` : ''}</div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function exerciseCardHtml(ex, i, currentExIdx) {
  const complete = exerciseIsComplete(ex);
  const skipped = !!ex.skipped;
  const done = complete || skipped;
  const pending = !done && i !== currentExIdx;
  const isCurrent = i === currentExIdx;

  let cardClass = 'ex-card';
  if (complete) cardClass += ' done';
  if (skipped) cardClass += ' skipped';
  if (pending) cardClass += ' pending';

  if (done) {
    const summary = skipped
      ? (ex.sets.length ? `${sessionExerciseSetSummary(ex)} · skipped rest` : 'Skipped')
      : ex.sets.map(s => `${fmtNum(s.weight)}×${s.reps}`).join(' · ');
    return `
      <div class="${cardClass}" data-ex-idx="${i}">
        <div class="ex-header">
          <div class="name">${esc(ex.name)}</div>
          <div class="progress mono">${skipped ? 'Skipped' : `${ex.sets.length}/${ex.targetSets}`}</div>
          <div class="check">${skipped ? '–' : '✓'}</div>
        </div>
        <div class="ex-summary">${summary}</div>
      </div>
    `;
  }

  return `
    <div class="${cardClass}" data-ex-idx="${i}">
      <div class="ex-header">
        <div class="name">${esc(ex.name)}</div>
        <div class="progress mono">${ex.sets.length}/${ex.targetSets}</div>
        ${isCurrent ? `<button class="btn ghost small skip-ex-btn" data-act="skip-ex" data-ex-idx="${i}">${ex.sets.length ? 'Skip Rest' : 'Skip'}</button>` : ''}
      </div>
      <div class="ex-target">Target: ${ex.targetSets} × ${ex.targetReps}</div>
      <div class="sets">
        ${Array.from({length: ex.targetSets}, (_, si) => setRowHtml(ex, i, si, isCurrent)).join('')}
      </div>
    </div>
  `;
}

function setRowHtml(ex, exIdx, si, isCurrentEx) {
  const logged = ex.sets[si];
  const isEditing = !!logged && editingSet && editingSet.exIdx === exIdx && editingSet.setIdx === si;
  const isActive = isCurrentEx && !logged && si === ex.sets.length;
  const isPending = !logged && !isActive;

  if (isEditing) {
    return `
      <div class="set-row editing" data-set-idx="${si}">
        <span class="lbl">${si + 1}</span>
        <input type="tel" inputmode="decimal" class="set-w" value="${logged.weight}" autocomplete="off" maxlength="6">
        ${repsStepperHtml(logged.reps)}
        <div class="edit-actions">
          <button class="log-btn" data-act="save-edit" title="Save">✓</button>
          <button class="cancel-btn" data-act="cancel-edit" title="Cancel">×</button>
        </div>
      </div>
    `;
  }

  if (logged) {
    return `
      <div class="set-row logged" data-edit-set="${exIdx},${si}">
        <span class="lbl">${si + 1} ✓</span>
        <span class="val">${fmtNum(logged.weight)} kg</span>
        <span class="val">× ${logged.reps}</span>
        <span class="edit-set-btn" aria-hidden="true">✎</span>
      </div>
    `;
  }

  if (isPending) {
    return `
      <div class="set-row pending">
        <span class="lbl">${si + 1}</span>
        <span class="val">– kg</span>
        <span class="val">× –</span>
        <span></span>
      </div>
    `;
  }

  // Active row — prefilled where possible
  const wPrefill = weightPrefillFor(ex, si);
  const rPrefill = repsPrefillFor(ex, si);
  const wHasValue = wPrefill !== '' && !isNaN(parseFloat(wPrefill));
  const last = findLastSet(ex.name, si);
  return `
    <div class="set-row active" data-set-idx="${si}">
      <span class="lbl">${si + 1}</span>
      <input type="tel" inputmode="decimal" class="set-w" value="${wHasValue ? wPrefill : ''}" placeholder="kg" autocomplete="off" maxlength="6">
      ${repsStepperHtml(rPrefill)}
      <button class="log-btn"${wHasValue ? '' : ' disabled'}>✓</button>
      ${last ? `
        <div class="last-ref">
          <span class="last-chip static">Last: ${fmtNum(last.weight)} kg × ${last.reps}</span>
        </div>
      ` : ''}
    </div>
  `;
}
