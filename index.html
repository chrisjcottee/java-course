function weekTimelineHtml(c) {
  const names = c.templateDayNames || [];
  if (!names.length) return '';
  const done = new Set(c.completedThisWeek || []);
  const doneCount = done.size;
  const total = names.length;

  // Cascade animation on week-complete; otherwise only the just-done node pops.
  const animate = (i) => {
    if (c.weekComplete && done.has(i)) return `animation-delay: ${i * 90}ms;`;
    if (!c.weekComplete && i === c.dayIndex) return '';
    return null;
  };

  const nodes = names.map((name, i) => {
    const isDone = done.has(i);
    const animStyle = animate(i);
    const isAnimated = animStyle !== null;
    const cls = ['week-tl-node', isDone ? 'done' : '', isAnimated ? 'animate-in' : ''].filter(Boolean).join(' ');
    return `<div class="${cls}"${animStyle ? ` style="${animStyle}"` : ''}>${isDone ? '✓' : (i + 1)}</div>`;
  });

  // Lines fill when both adjacent nodes are done.
  const row = [];
  nodes.forEach((node, i) => {
    row.push(node);
    if (i < nodes.length - 1) {
      const filled = done.has(i) && done.has(i + 1);
      row.push(`<div class="week-tl-line${filled ? ' filled' : ''}"></div>`);
    }
  });

  const labels = names.map((name, i) => {
    const isDone = done.has(i);
    const label = (name || '').trim() || `Day ${i + 1}`;
    return `<div class="week-tl-name${isDone ? ' done' : ''}">${esc(label)}</div>`;
  }).join('');

  return `
    <div class="week-timeline${c.weekComplete ? ' week-complete' : ''}">
      <div class="week-tl-row">${row.join('')}</div>
      <div class="week-tl-labels">${labels}</div>
      <div class="week-tl-caption">Week ${c.weekIndex + 1} · ${doneCount} of ${total} done</div>
    </div>
  `;
}

/* ---------- Event handling ---------- */
function bindGlobalEvents() {
  document.addEventListener('click', onClick);
  document.addEventListener('input', onInput);
  document.addEventListener('keydown', onKeydown);
  document.addEventListener('focusin', onFocusIn);
}

function onFocusIn(e) {
  // Select the prefilled weight on focus so it can be overtyped immediately.
  if (e.target.classList && e.target.classList.contains('set-w') && e.target.value) {
    setTimeout(() => { try { e.target.select(); } catch (_) {} }, 0);
  }
}

function onClick(e) {
  const t = e.target.closest('[data-tab]');
  if (t) {
    setState({ tab: t.dataset.tab });
    return;
  }

  // Setup screen
  if (e.target.classList.contains('step-btn')) {
    if (e.target.closest('.set-row')) {
      handleRepsStepperClick(e.target);
    } else {
      handleStepperClick(e.target);
    }
    return;
  }
  if (e.target.id === 'add-day') {
    setupDraft.days.push(makeDay());
    rerenderSetup();
    return;
  }
  if (e.target.dataset.act === 'rm-day') {
    const di = +e.target.closest('[data-day]').dataset.day;
    setupDraft.days.splice(di, 1);
    rerenderSetup();
    return;
  }
  if (e.target.dataset.act === 'add-ex') {
    const di = +e.target.closest('[data-day]').dataset.day;
    setupDraft.days[di].exercises.push(makeEx());
    rerenderSetup();
    return;
  }
  if (e.target.dataset.act === 'rm-ex') {
    const di = +e.target.closest('[data-day]').dataset.day;
    const ej = +e.target.closest('[data-ex]').dataset.ex;
    setupDraft.days[di].exercises.splice(ej, 1);
    if (setupDraft.days[di].exercises.length === 0) {
      setupDraft.days[di].exercises.push(makeEx());
    }
    rerenderSetup();
    return;
  }
  if (e.target.id === 'save-program') {
    saveSetup();
    return;
  }
  if (e.target.id === 'cancel-setup') {
    setupDraft = null;
    state.editing = false;
    setState({ tab: 'program' });
    return;
  }

  // Today
  const weekEl = e.target.closest && e.target.closest('[data-select-week]');
  if (weekEl) {
    selectedWeekIndex = clampWeekIndex(weekEl.dataset.selectWeek);
    expandedDayKey = defaultExpandedDayKey(selectedWeekIndex);
    render();
    return;
  }
  if (e.target.dataset.startDay != null) {
    startWorkout(parseInt(e.target.dataset.startDay, 10));
    return;
  }
  const expandEl = e.target.closest && e.target.closest('[data-expand-day-key]');
  if (expandEl && !e.target.closest('[data-start-day]')) {
    const key = expandEl.dataset.expandDayKey;
    expandedDayKey = (expandedDayKey === key) ? null : key;
    render();
    return;
  }
  if (e.target.id === 'restart-program') {
    showModal({
      title: 'Start program over?',
      body: 'Your week progress will reset to Week 1. History stays intact.',
      confirmText: 'Restart',
      onConfirm: () => {
        state.currentRun = { startedAt: Date.now(), weekIndex: 0, completedDayIndices: [] };
        selectedWeekIndex = null;
        expandedDayKey = null;
        closeModal();
        setState({});
      }
    });
    return;
  }

  // Program tab
  if (e.target.id === 'add-program') {
    setupDraft = { id: null, name: 'New Program', weeks: 8, days: [makeDay()], makeActive: true };
    state.editing = true;
    save();
    render();
    return;
  }
  if (e.target.id === 'edit-program') {
    const active = findProgramRecord(state.activeProgramId);
    const program = active || makeProgramRecord(state.program || { name: 'My Program', weeks: 8, template: [makeDay()] }, { id: state.activeProgramId || undefined });
    setupDraft = { id: program.id, name: program.name, weeks: program.weeks, days: structuredClone(program.template), makeActive: true };
    state.editing = true;
    save();
    render();
    return;
  }
  const programRow = e.target.closest && e.target.closest('[data-program-id]');
  if (programRow && e.target.dataset.act === 'edit-program-library') {
    const program = findProgramRecord(programRow.dataset.programId);
    if (!program) return;
    setupDraft = { id: program.id, name: program.name, weeks: program.weeks, days: structuredClone(program.template), makeActive: program.id === state.activeProgramId };
    state.editing = true;
    save();
    render();
    return;
  }
  if (programRow && e.target.dataset.act === 'use-program') {
    showModal({
      title: 'Use this program?',
      body: 'Today will switch to this program and start its progress from Week 1.',
      confirmText: 'Use Program',
      onConfirm: () => {
        setActiveProgram(programRow.dataset.programId, { resetProgress: true });
        closeModal();
        setState({ tab: 'today' });
      }
    });
    return;
  }
  if (programRow && e.target.dataset.act === 'delete-program-library') {
    deleteProgramRecord(programRow.dataset.programId);
    return;
  }
  if (e.target.id === 'reset-program') {
    showModal({
      title: 'Reset everything?',
      body: 'This deletes your program, all logged workouts, XP, and streak. Cannot be undone.',
      confirmText: 'Delete All',
      danger: true,
      onConfirm: () => {
        state = structuredClone(DEFAULT_STATE);
        setupDraft = null;
        selectedWeekIndex = null;
        expandedDayKey = null;
        closeModal();
        setState({});
      }
    });
    return;
  }
  if (e.target.id === 'add-library-exercise') {
    addLibraryExercise();
    return;
  }
  const libraryRow = e.target.closest && e.target.closest('[data-library-ex-id]');
  if (libraryRow && e.target.dataset.act === 'edit-library-ex') {
    editingExerciseLibraryId = libraryRow.dataset.libraryExId;
    render();
    return;
  }
  if (libraryRow && e.target.dataset.act === 'cancel-library-ex') {
    editingExerciseLibraryId = null;
    render();
    return;
  }
  if (libraryRow && e.target.dataset.act === 'save-library-ex') {
    saveLibraryExercise(libraryRow);
    return;
  }
  if (libraryRow && e.target.dataset.act === 'remove-library-ex') {
    removeLibraryExercise(libraryRow.dataset.libraryExId);
    return;
  }

  // Workout
  if (e.target.id === 'finish-workout') {
    if (withUnloggedSetGuard(endWorkoutFlow, 'Finish without set')) return;
    endWorkoutFlow();
    return;
  }
  if (e.target.dataset.act === 'skip-ex') {
    const exIdx = parseInt(e.target.dataset.exIdx, 10);
    if (withUnloggedSetGuard(() => skipExercise(exIdx), 'Skip without set')) return;
    skipExercise(exIdx);
    return;
  }
  const editEl = e.target.closest && e.target.closest('[data-edit-set]');
  if (editEl) {
    const [exIdx, setIdx] = editEl.dataset.editSet.split(',').map(Number);
    editingSet = { exIdx, setIdx };
    render();
    return;
  }
  if (e.target.dataset.act === 'save-edit') {
    saveEditedSet(e.target.closest('.set-row'));
    return;
  }
  if (e.target.dataset.act === 'cancel-edit') {
    editingSet = null;
    render();
    return;
  }
  if (e.target.classList.contains('log-btn')) {
    logCurrentSet(e.target.closest('.set-row'));
    return;
  }
  if (e.target.classList.contains('dot') && e.target.dataset.jump != null) {
    const idx = +e.target.dataset.jump;
    const card = document.querySelector(`[data-ex-idx="${idx}"]`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }

  if (e.target.id === 'celebrate-continue') {
    const c = state.celebration;
    if (c && c.type === 'workout' && c.fullyComplete) {
      selectedWeekIndex = c.weekComplete || c.programComplete ? currentWeekIndex() : clampWeekIndex(c.weekIndex);
      expandedDayKey = c.weekComplete || c.programComplete
        ? defaultExpandedDayKey(selectedWeekIndex)
        : dayKey(selectedWeekIndex, c.dayIndex);
    }
    state.celebration = null;
    save();
    render();
    return;
  }

  // Modal
  if (e.target.classList.contains('modal-backdrop')) {
    closeModal();
    return;
  }
  if (e.target.id === 'modal-cancel') {
    closeModal();
    return;
  }
  if (e.target.id === 'modal-confirm') {
    const fn = modal && modal.onConfirm;
    if (fn) fn();
    return;
  }
  if (e.target.id === 'modal-extra') {
    const fn = modal && modal.extraAction && modal.extraAction.onClick;
    if (fn) fn();
    return;
  }
}

function onInput(e) {
  if (e.target.id === 'exercise-library-search') {
    exerciseLibrarySearch = e.target.value;
    const pos = e.target.selectionStart || exerciseLibrarySearch.length;
    const scrollY = window.scrollY || 0;
    render();
    requestAnimationFrame(() => {
      window.scrollTo(0, scrollY);
      const input = document.getElementById('exercise-library-search');
      if (input) {
        input.focus();
        try { input.setSelectionRange(pos, pos); } catch (_) {}
      }
    });
    return;
  }

  // Setup live edits
  if (e.target.id === 'prog-name') {
    setupDraft.name = e.target.value;
    return;
  }
  if (e.target.classList.contains('day-name')) {
    const di = +e.target.closest('[data-day]').dataset.day;
    setupDraft.days[di].name = e.target.value;
    return;
  }
  if (e.target.matches('.ex-editor input[data-f]')) {
    const di = +e.target.closest('[data-day]').dataset.day;
    const ej = +e.target.closest('[data-ex]').dataset.ex;
    const field = e.target.dataset.f;
    const val = field === 'name' ? e.target.value : parseFloat(e.target.value) || 0;
    setupDraft.days[di].exercises[ej][field] = val;
    return;
  }

  // Workout set inputs
  if (e.target.classList.contains('set-w') || e.target.classList.contains('set-r')) {
    const row = e.target.closest('.set-row');
    if (row) row.dataset.dirty = '1';
    updateLogBtn(row);
    return;
  }
}

function onKeydown(e) {
  if (e.key === 'Enter') {
    if (e.target.id === 'new-exercise-name') {
      e.preventDefault();
      addLibraryExercise();
      return;
    }
    const libraryEditRow = e.target.closest && e.target.closest('.library-row.editing');
    if (libraryEditRow) {
      e.preventDefault();
      saveLibraryExercise(libraryEditRow);
      return;
    }
    const editRow = e.target.closest && e.target.closest('.set-row.editing');
    if (editRow) {
      e.preventDefault();
      saveEditedSet(editRow);
      return;
    }
    const row = e.target.closest && e.target.closest('.set-row.active');
    if (row) {
      e.preventDefault();
      const btn = row.querySelector('.log-btn');
      if (btn && !btn.disabled) logCurrentSet(row);
    }
  }
  if (e.key === 'Escape') {
    if (editingSet) {
      editingSet = null;
      render();
      return;
    }
    if (modal) closeModal();
  }
}

function updateLogBtn(row) {
  if (!row) return;
  const w = parseFloat(row.querySelector('.set-w').value);
  const r = parseInt(row.querySelector('.set-r').value, 10);
  const ok = !isNaN(w) && w >= 0 && !isNaN(r) && r > 0;
  row.querySelector('.log-btn').disabled = !ok;
}

function rerenderSetup() {
  const app = $('#app');
  app.innerHTML = Views.setup();
}

function handleRepsStepperClick(btn) {
  const row = btn.closest('.set-row');
  if (!row) return;
  const hidden = row.querySelector('.set-r');
  const display = row.querySelector('.reps-stepper .step-val');
  if (!hidden || !display) return;
  const delta = parseInt(btn.dataset.step, 10);
  const cur = parseInt(hidden.value, 10) || 0;
  const next = clampStepper(cur + delta, 1, 100);
  hidden.value = next;
  display.textContent = next;
  row.dataset.dirty = '1';
  updateLogBtn(row);
}

function handleStepperClick(btn) {
  const delta = parseInt(btn.dataset.step, 10);
  const stepper = btn.closest('.stepper');
  if (!stepper) return;
  // Program-level stepper (weeks)
  if (stepper.dataset.stepperTarget === 'weeks') {
    setupDraft.weeks = clampStepper(setupDraft.weeks + delta, 1, 52);
    rerenderSetup();
    return;
  }
  // Per-exercise stepper (sets or reps)
  const field = stepper.dataset.f;
  if (!field) return;
  const dayEl = btn.closest('[data-day]');
  const exEl = btn.closest('[data-ex]');
  if (!dayEl || !exEl) return;
  const di = +dayEl.dataset.day;
  const ei = +exEl.dataset.ex;
  const max = field === 'sets' ? 20 : 100;
  const ex = setupDraft.days[di].exercises[ei];
  ex[field] = clampStepper((ex[field] || 1) + delta, 1, max);
  rerenderSetup();
}

function clampStepper(n, lo, hi) {
  return Math.max(lo, Math.min(hi, n));
}

function findLibraryExercise(id) {
  state.exerciseLibrary = normalizeExerciseLibrary(state);
  return state.exerciseLibrary.find(e => e.id === id);
}

function addLibraryExercise() {
  const input = document.getElementById('new-exercise-name');
  const name = input ? input.value.trim() : '';
  if (!name) {
    showModal({
      title: 'Name required',
      body: 'Enter an exercise name first.',
      confirmText: 'OK',
      hideCancel: true,
      onConfirm: closeModal
    });
    return;
  }
  ensureExerciseInLibrary(name);
  exerciseLibrarySearch = '';
  save();
  render();
}

function saveLibraryExercise(row) {
  const ex = findLibraryExercise(row.dataset.libraryExId);
  if (!ex) return;
  const input = row.querySelector('.library-edit-name');
  const nextName = input ? input.value.trim() : '';
  if (!nextName) {
    showModal({
      title: 'Name required',
      body: 'Exercise names cannot be blank.',
      confirmText: 'OK',
      hideCancel: true,
      onConfirm: closeModal
    });
    return;
  }
  const duplicate = state.exerciseLibrary.find(e =>
    e.id !== ex.id && !e.archived && e.name.toLowerCase() === nextName.toLowerCase()
  );
  if (duplicate) {
    showModal({
      title: 'Already in library',
      body: 'An active exercise already uses that name.',
      confirmText: 'OK',
      hideCancel: true,
      onConfirm: closeModal
    });
    return;
  }
  const oldName = ex.name;
  ex.name = nextName;
  updateProgramExerciseName(oldName, nextName);
  editingExerciseLibraryId = null;
  state.exerciseLibrary.sort((a, b) => a.name.localeCompare(b.name));
  save();
  render();
}

function removeLibraryExercise(id) {
  const ex = findLibraryExercise(id);
  if (!ex) return;
  const doRemove = () => {
    ex.archived = true;
    editingExerciseLibraryId = null;
    closeModal();
    save();
    render();
  };
  if (exerciseUsedInCurrentProgram(ex.name)) {
    showModal({
      title: 'Remove from library?',
      body: 'This exercise stays in your current program and workout history, but it will no longer appear as a new selection.',
      confirmText: 'Remove',
      danger: true,
      onConfirm: doRemove
    });
    return;
  }
  doRemove();
}

function deleteProgramRecord(id) {
  const program = findProgramRecord(id);
  if (!program) return;
  const remaining = activeProgramLibrary().filter(p => p.id !== id);
  const doDelete = () => {
    program.archived = true;
    if (state.activeProgramId === id) {
      if (remaining.length) {
        setActiveProgram(remaining[0].id, { resetProgress: true });
      } else {
        state.activeProgramId = null;
        state.program = null;
        state.active = null;
        state.celebration = null;
        state.currentRun = { startedAt: null, weekIndex: 0, completedDayIndices: [] };
        selectedWeekIndex = null;
        expandedDayKey = null;
      }
    }
    state.programLibrary = state.programLibrary.filter(p => p.id !== id);
    closeModal();
    save();
    render();
  };
  showModal({
    title: 'Delete program?',
    body: state.activeProgramId === id
      ? 'This removes the active program from Settings. Workout history stays saved, but Today will switch to another saved program if one exists.'
      : 'This removes the program from Settings. Workout history stays saved.',
    confirmText: 'Delete',
    danger: true,
    onConfirm: doDelete
  });
}

function saveSetup() {
  setupDraft.name = (setupDraft.name || '').trim() || 'My Program';
  // Validate: at least one day, each day has at least one exercise with a name
  const cleanDays = setupDraft.days
    .map(d => ({
      name: (d.name || '').trim(),
      exercises: d.exercises
        .filter(e => (e.name || '').trim())
        .map(e => ({
          name: e.name.trim(),
          sets: Math.max(1, parseInt(e.sets) || 1),
          reps: Math.max(1, parseInt(e.reps) || 1)
        }))
    }))
    .filter(d => d.exercises.length > 0);

  if (!cleanDays.length) {
    showModal({
      title: 'Add an exercise',
      body: 'Your program needs at least one day with at least one exercise.',
      confirmText: 'OK',
      hideCancel: true,
      onConfirm: closeModal
    });
    return;
  }

  cleanDays.forEach((d, i) => { if (!d.name) d.name = 'Day ' + (i + 1); });
  cleanDays.forEach(d => d.exercises.forEach(e => ensureExerciseInLibrary(e.name)));

  const weeks = Math.max(1, parseInt(setupDraft.weeks) || 1);
  const program = { name: setupDraft.name, weeks, template: cleanDays };
  state.programLibrary = normalizeProgramLibrary(state);
  const existing = setupDraft.id ? state.programLibrary.find(p => p.id === setupDraft.id) : null;
  const record = makeProgramRecord(program, existing || { id: setupDraft.id || undefined });
  const idx = state.programLibrary.findIndex(p => p.id === record.id);
  if (idx >= 0) state.programLibrary[idx] = record;
  else state.programLibrary.unshift(record);

  const shouldActivate = setupDraft.makeActive || !state.program || state.activeProgramId === record.id;
  if (shouldActivate) {
    const sameProgram = state.activeProgramId === record.id;
    state.activeProgramId = record.id;
    state.program = programFromRecord(record);
    state.active = null;
    state.celebration = null;
    selectedWeekIndex = null;
    expandedDayKey = null;
    if (!sameProgram) {
      state.currentRun = { startedAt: Date.now(), weekIndex: 0, completedDayIndices: [] };
    } else {
      state.currentRun.weekIndex = Math.min(state.currentRun.weekIndex, weeks);
      state.currentRun.completedDayIndices = state.currentRun.completedDayIndices.filter(i => i < cleanDays.length);
    }
  }

  state.editing = false;
  setupDraft = null;
  state.tab = shouldActivate ? 'today' : 'program';
  save();
  render();
}

/* ---------- Workout actions ---------- */
function startWorkout(dayIndex) {
  if (programIsComplete()) return;
  if (dayIsDoneThisWeek(dayIndex)) return;
  if (dayIndex !== nextDayIndex()) return;
  const day = state.program.template[dayIndex];
  if (!day) return;
  editingSet = null;
  selectedWeekIndex = state.currentRun.weekIndex || 0;
  expandedDayKey = dayKey(selectedWeekIndex, dayIndex);
  state.active = {
    programId: state.activeProgramId || null,
    programName: state.program.name,
    weekIndex: state.currentRun.weekIndex,
    dayIndex,
    dayName: day.name || ('Day ' + (dayIndex + 1)),
    startedAt: Date.now(),
    exercises: day.exercises.map(e => ({
      name: e.name,
      targetSets: e.sets,
      targetReps: e.reps,
      sets: [],
      skipped: false
    }))
  };
  save();
  render();
}

function withUnloggedSetGuard(next, continueText) {
  const row = document.querySelector('.set-row.active');
  if (!row) return false;
  const weightInput = row.querySelector('.set-w');
  const repsInput = row.querySelector('.set-r');
  if (row.dataset.dirty !== '1') return false;
  const weightText = weightInput ? weightInput.value.trim() : '';
  if (!weightText) return false;

  const w = parseFloat(weightText);
  const r = parseInt(repsInput && repsInput.value, 10);
  if (isNaN(w) || w < 0 || isNaN(r) || r <= 0) {
    showModal({
      title: 'Check current set',
      body: 'The current set has a value typed in, but it is not valid yet.',
      confirmText: 'OK',
      hideCancel: true,
      onConfirm: closeModal
    });
    return true;
  }

  showModal({
    title: 'Save current set?',
    body: 'You have numbers typed into the current set, but it has not been logged yet.',
    confirmText: 'Save Set',
    onConfirm: () => {
      closeModal();
      logCurrentSet(row);
      next();
    },
    extraAction: {
      label: continueText || 'Continue without set',
      onClick: () => {
        closeModal();
        next();
      }
    }
  });
  return true;
}

function skipExercise(exIdx) {
  const a = state.active;
  if (!a) return;
  const ex = a.exercises[exIdx];
  if (!ex || exerciseIsResolved(ex)) return;

  const applySkip = () => {
    ex.skipped = true;
    ex.skippedAt = Date.now();
    editingSet = null;
    closeModal();
    save();
    render();
    requestAnimationFrame(() => {
      const nextCard = document.querySelector('.ex-card:not(.done):not(.skipped):not(.pending)');
      if (nextCard) nextCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  };

  showModal({
    title: ex.sets.length ? 'Skip remaining sets?' : 'Skip exercise?',
    body: ex.sets.length
      ? 'Logged sets stay saved. The remaining sets for this exercise will be marked skipped.'
      : 'This exercise will be marked skipped and the workout will move to the next exercise.',
    confirmText: ex.sets.length ? 'Skip Rest' : 'Skip',
    onConfirm: applySkip
  });
}

function endWorkoutFlow() {
  const a = state.active;
  if (!a) return;
  const fullyComplete = a.exercises.every(exerciseIsResolved);
  const anyLogged = a.exercises.some(e => e.sets.length > 0);
  const anySkipped = a.exercises.some(e => e.skipped);

  if (fullyComplete) {
    finishWorkout();
    return;
  }

  if (!anyLogged && !anySkipped) {
    showModal({
      title: 'Discard workout?',
      body: 'You haven\'t logged any sets yet.',
      confirmText: 'Discard',
      danger: true,
      onConfirm: () => {
        state.active = null;
        editingSet = null;
        closeModal();
        setState({});
      }
    });
    return;
  }

  // Partial — give the choice between Save & End and Discard
  showModal({
    title: 'Save your progress?',
    body: 'You haven\'t resolved every exercise. Save this as a partial workout, or discard it?',
    confirmText: 'Save Partial',
    onConfirm: () => {
      finishWorkout({ partial: true });
      closeModal();
    },
    extraAction: {
      label: 'Discard workout',
      danger: true,
      onClick: () => {
        state.active = null;
        editingSet = null;
        closeModal();
        setState({});
      }
    }
  });
}

function saveEditedSet(row) {
  if (!row || !state.active || !editingSet) return;
  const w = parseFloat(row.querySelector('.set-w').value);
  const r = parseInt(row.querySelector('.set-r').value, 10);
  if (isNaN(w) || isNaN(r) || r <= 0 || w < 0) return;
  const ex = state.active.exercises[editingSet.exIdx];
  const existing = ex.sets[editingSet.setIdx];
  if (!existing) { editingSet = null; render(); return; }
  ex.sets[editingSet.setIdx] = { ...existing, weight: w, reps: r };
  editingSet = null;
  save();
  render();
}

function logCurrentSet(row) {
  if (!row || !state.active) return;
  const w = parseFloat(row.querySelector('.set-w').value);
  const r = parseInt(row.querySelector('.set-r').value, 10);
  if (isNaN(w) || isNaN(r) || r <= 0) return;
  const card = row.closest('.ex-card');
  const exIdx = +card.dataset.exIdx;
  const ex = state.active.exercises[exIdx];
  ex.sets.push({ weight: w, reps: r, ts: Date.now() });
  const exJustCompleted = ex.sets.length === ex.targetSets;
  buzz(exJustCompleted ? [20, 40, 20] : 12);
  save();
  render();
  // After render, focus the next active input if there is one
  requestAnimationFrame(() => {
    const next = document.querySelector('.set-row.active .set-w');
    if (next && document.activeElement !== next) {
      // Auto-focus only on same-exercise advance, to avoid hijacking when an exercise finishes
      const stillSameEx = ex.sets.length < ex.targetSets;
      if (stillSameEx) next.focus();
      else {
        const nextCard = document.querySelector('.ex-card:not(.done):not(.pending)');
        if (nextCard) nextCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }
  });
}

function finishWorkout(opts = {}) {
  const a = state.active;
  if (!a) return;
  const exsWithSets = a.exercises.filter(e => e.sets.length > 0);
  const sessionExercises = a.exercises.filter(e => e.sets.length > 0 || e.skipped);
  if (!sessionExercises.length) {
    state.active = null;
    editingSet = null;
    save();
    render();
    return;
  }

  const session = {
    date: Date.now(),
    programId: a.programId || state.activeProgramId || null,
    programName: a.programName || (state.program && state.program.name) || '',
    weekIndex: a.weekIndex,
    dayIndex: a.dayIndex,
    dayName: a.dayName,
    durationMs: Date.now() - a.startedAt,
    exercises: sessionExercises.map(e => ({
      name: e.name,
      sets: e.sets,
      skipped: !!e.skipped,
      skippedAt: e.skippedAt || null,
      targetSets: e.targetSets,
      targetReps: e.targetReps
    }))
  };
  state.sessions.push(session);

  // Determine if the day has been resolved: every exercise logged or explicitly skipped.
  const fullyComplete = !opts.partial &&
    a.exercises.every(exerciseIsResolved);

  let xpEarned = 0;
  let weekComplete = false;
  let programComplete = false;
  const prevLvl = levelFromXp(state.stats.xp);
  const loggedSetCount = setCount(exsWithSets);

  // XP per set
  exsWithSets.forEach(e => { xpEarned += e.sets.length * 10; });
  // Exercise complete bonus
  exsWithSets.forEach(e => {
    if (!e.skipped && exerciseIsComplete(e)) xpEarned += 25;
  });

  if (fullyComplete) {
    if (loggedSetCount > 0) xpEarned += 100;

    // Streak (per workout day)
    const today = Date.now();
    if (loggedSetCount > 0) {
      const last = state.stats.lastDayCompleteDate;
      if (last) {
        const gap = daysBetween(last, today);
        if (gap === 0) {
          // same day, no change
        } else if (gap <= 2) {
          state.stats.streak += 1;
        } else {
          state.stats.streak = 1;
        }
      } else {
        state.stats.streak = 1;
      }
      state.stats.lastDayCompleteDate = today;
    }

    // Mark this day done this week (if not already)
    if (!state.currentRun.completedDayIndices.includes(a.dayIndex)) {
      state.currentRun.completedDayIndices.push(a.dayIndex);
    }

    // Week complete?
    if (state.currentRun.completedDayIndices.length >= state.program.template.length) {
      weekComplete = true;
      xpEarned += 500;
      state.currentRun.weekIndex += 1;
      state.currentRun.completedDayIndices = [];

      // Program complete?
      if (programIsComplete()) {
        programComplete = true;
        xpEarned += 2500;
      }
    }
  }

  state.stats.xp += xpEarned;
  const leveledUp = levelFromXp(state.stats.xp) > prevLvl;

  // Snapshot of which template days are done in the week we just worked.
  // For a normal day-complete this matches currentRun.completedDayIndices.
  // For a week-complete the run has already reset, so synthesize the full set.
  const completedThisWeek = weekComplete
    ? state.program.template.map((_, i) => i)
    : state.currentRun.completedDayIndices.slice();
  const templateDayNames = state.program.template.map(d => d.name || '');

  state.celebration = {
    type: 'workout',
    dayName: a.dayName,
    dayIndex: a.dayIndex,
    weekIndex: a.weekIndex,
    setCount: loggedSetCount,
    volume: totalVolume(exsWithSets),
    skippedCount: skippedCount(a.exercises),
    xpEarned,
    leveledUp,
    fullyComplete,
    weekComplete,
    programComplete,
    completedThisWeek,
    templateDayNames
  };
  if (programComplete) buzz([80, 60, 80, 60, 80, 60, 200]);
  else if (weekComplete) buzz([60, 80, 60, 80, 60]);
  else if (fullyComplete) buzz([30, 60, 30]);
  state.active = null;
  editingSet = null;
  save();
  render();
}

/* ---------- Modal ---------- */
function showModal(cfg) {
  modal = cfg;
  renderModal();
}
function closeModal() {
  modal = null;
  const el = document.getElementById('modal-root');
  if (el) el.remove();
}
function renderModal() {
  let root = document.getElementById('modal-root');
  if (!root) {
    root = document.createElement('div');
    root.id = 'modal-root';
    document.body.appendChild(root);
  }
  root.innerHTML = `
    <div class="modal-backdrop">
      <div class="modal">
        <h3>${esc(modal.title)}</h3>
        ${modal.body ? `<p>${esc(modal.body)}</p>` : ''}
        <div class="btn-group">
          ${modal.hideCancel ? '' : `<button class="btn secondary" id="modal-cancel">Cancel</button>`}
          <button class="btn" id="modal-confirm" style="${modal.danger ? 'background: var(--danger);' : ''}">${esc(modal.confirmText || 'OK')}</button>
        </div>
        ${modal.extraAction ? `<button class="modal-extra ${modal.extraAction.danger ? 'danger' : ''}" id="modal-extra">${esc(modal.extraAction.label)}</button>` : ''}
      </div>
    </div>
  `;
}

/* ---------- Boot ---------- */
bindGlobalEvents();
render();

if (!storageWorks()) {
  showModal({
    title: 'Storage is disabled',
    body: 'This browser isn\'t letting the app save anything to local storage. The most common cause is Private/Incognito mode. Open this URL in a regular browser tab and add it to your home screen from there.',
    confirmText: 'OK',
    hideCancel: true,
    onConfirm: closeModal
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
