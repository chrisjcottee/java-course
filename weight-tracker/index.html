<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Weight Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0071e3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Weight Tracker">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<style>
  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --text: #1c1c1e;
    --text-dim: #6c6c70;
    --text-faint: #a1a1a6;
    --accent: #0071e3;
    --accent-dim: #e6f0fb;
    --success: #34c759;
    --success-dim: #e6f8eb;
    --danger: #ff3b30;
    --warn: #ff9500;
    --border: #e5e5ea;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.05);
    --radius: 14px;
    --radius-sm: 10px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
    --tab-h: 64px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    line-height: 1.4;
    min-height: 100vh;
    overscroll-behavior-y: contain;
    touch-action: manipulation;
  }
  #app {
    max-width: 640px;
    margin: 0 auto;
    padding: calc(16px + var(--safe-top)) 16px calc(var(--tab-h) + var(--safe-bottom) + 16px);
  }
  #app.fullscreen {
    padding-bottom: calc(var(--safe-bottom) + 96px);
  }

  /* Typography */
  h1 { font-size: 28px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.02em; }
  h2 { font-size: 20px; font-weight: 600; margin: 24px 0 12px; letter-spacing: -0.01em; }
  h3 { font-size: 17px; font-weight: 600; margin: 0; }
  .subtle { color: var(--text-dim); font-size: 14px; }
  .faint { color: var(--text-faint); font-size: 13px; }
  .mono { font-variant-numeric: tabular-nums; }

  /* Cards */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .card.compact { padding: 12px 16px; }
  .card.flat { box-shadow: none; border: 1px solid var(--border); }
  .row { display: flex; align-items: center; gap: 12px; }
  .row.between { justify-content: space-between; }
  .row.wrap { flex-wrap: wrap; }
  .stack { display: flex; flex-direction: column; gap: 4px; }

  /* Buttons */
  .btn {
    border: none;
    background: var(--accent);
    color: white;
    font-size: 17px;
    font-weight: 600;
    padding: 14px 20px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    width: 100%;
    font-family: inherit;
    transition: opacity 0.15s, transform 0.05s;
  }
  .btn:active { transform: scale(0.98); opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.secondary { background: var(--accent-dim); color: var(--accent); }
  .btn.ghost { background: transparent; color: var(--accent); }
  .btn.danger { background: transparent; color: var(--danger); }
  .btn.success { background: var(--success); }
  .btn.small { padding: 8px 14px; font-size: 14px; width: auto; }
  .btn.icon {
    width: 36px; height: 36px; padding: 0;
    border-radius: 50%; display: inline-flex;
    align-items: center; justify-content: center;
    background: var(--bg); color: var(--text-dim);
    font-size: 18px; font-weight: 400;
  }
  .btn-group { display: flex; gap: 8px; }
  .btn-group .btn { flex: 1; }

  /* Inputs */
  input[type="text"], input[type="number"], input[type="tel"] {
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 16px;
    font-family: inherit;
    width: 100%;
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
  }
  input::placeholder { color: var(--text-faint); }
  label.field { display: block; margin-bottom: 12px; }
  label.field .lbl { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }

  /* Tab bar */
  #tabs {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    height: calc(var(--tab-h) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    z-index: 50;
  }
  #tabs[hidden] { display: none; }
  .tab {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 8px 4px;
    font-family: inherit;
  }
  .tab .ico { font-size: 22px; line-height: 1; }
  .tab.active { color: var(--accent); }

  /* Stat row */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 12px 0 20px;
  }
  .stat {
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat .v { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .stat .k { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }

  /* Progress */
  .progress-bar {
    height: 8px;
    background: var(--bg);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }
  .progress-bar.success .fill { background: var(--success); }

  /* Day list */
  .day-list .day-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--card);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    border: 1px solid transparent;
  }
  .day-list .day-item.current { border-color: var(--accent); background: var(--accent-dim); }
  .day-list .day-item.done .num { background: var(--success); color: white; }
  .day-list .num {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--bg);
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 14px;
    flex-shrink: 0;
  }
  .day-list .day-item.current .num { background: var(--accent); color: white; }
  .day-list .name { flex: 1; font-weight: 500; }
  .day-list .meta { font-size: 13px; color: var(--text-dim); }

  /* Workout view */
  .workout-top {
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    padding-top: var(--safe-top);
    margin: calc(-1 * (16px + var(--safe-top))) -16px 12px;
    padding: calc(12px + var(--safe-top)) 16px 12px;
  }
  .workout-top .row { margin-bottom: 12px; }
  .dots { display: flex; gap: 6px; flex-wrap: wrap; }
  .dot {
    width: 28px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    flex: 1;
    min-width: 16px;
    max-width: 40px;
    cursor: pointer;
  }
  .dot.current { background: var(--accent); }
  .dot.done { background: var(--success); }

  /* Exercise card */
  .ex-card {
    background: var(--card);
    border-radius: var(--radius);
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: opacity 0.15s;
  }
  .ex-card.pending { opacity: 0.55; }
  .ex-card.done .ex-header { background: var(--success-dim); }
  .ex-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ex-header .name { flex: 1; font-weight: 600; font-size: 16px; }
  .ex-header .progress {
    font-size: 13px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .ex-header .check {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--success);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 700;
  }
  .ex-target { font-size: 13px; color: var(--text-dim); padding: 0 16px 12px; }
  .ex-summary { font-size: 13px; color: var(--text-dim); padding: 0 16px 12px; font-variant-numeric: tabular-nums; }

  /* Set rows */
  .sets { padding: 0 12px 12px; }
  .set-row {
    display: grid;
    grid-template-columns: 48px 1fr 1fr 56px;
    gap: 8px;
    align-items: center;
    padding: 10px 4px;
    border-top: 1px solid var(--border);
  }
  .set-row:first-child { border-top: none; }
  .set-row .lbl { font-size: 13px; color: var(--text-dim); font-weight: 600; }
  .set-row.logged {
    color: var(--text);
  }
  .set-row.logged .val {
    font-size: 16px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .set-row.logged .lbl { color: var(--success); }
  .set-row.pending { color: var(--text-faint); }
  .set-row.pending .val {
    font-size: 14px;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
  }
  .set-row.active input,
  .set-row.editing input {
    height: 44px;
    padding: 0 12px;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    background: var(--bg);
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    box-sizing: border-box;
  }
  .set-row.active .log-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    height: 44px;
    font-size: 20px;
    cursor: pointer;
    font-weight: 700;
    box-sizing: border-box;
  }
  .set-row.active .log-btn:disabled {
    background: var(--border);
    color: var(--text-faint);
  }
  .set-row.logged {
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s ease;
    border-radius: var(--radius-sm);
  }
  .set-row.logged:active { background: var(--bg); }
  .edit-set-btn {
    color: var(--text-faint);
    font-size: 18px;
    justify-self: end;
    pointer-events: none;
  }
  .set-row.editing {
    grid-template-columns: 48px 1fr 1fr 96px;
    background: var(--accent-dim);
    border-radius: var(--radius-sm);
    padding: 8px;
  }
  .set-row.editing .edit-actions {
    display: flex;
    gap: 4px;
  }
  .set-row.editing .edit-actions .log-btn,
  .set-row.editing .edit-actions .cancel-btn {
    flex: 1;
    border: none;
    border-radius: var(--radius-sm);
    height: 44px;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    box-sizing: border-box;
  }
  .set-row.editing .edit-actions .log-btn {
    background: var(--accent);
    color: white;
  }
  .set-row.editing .edit-actions .log-btn:disabled {
    background: var(--border);
    color: var(--text-faint);
  }
  .set-row.editing .edit-actions .cancel-btn {
    background: white;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .last-ref {
    grid-column: 2 / 5;
    margin-top: -4px;
    padding-bottom: 8px;
  }
  .last-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    color: var(--text-dim);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
  }
  .last-chip.static { cursor: default; }
  .last-chip .copy { color: var(--accent); font-weight: 600; }

  /* Compact reps stepper in workout set rows */
  .set-row .reps-stepper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 44px;
    background: var(--bg);
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    padding: 2px;
    min-width: 0;
    box-sizing: border-box;
  }
  .set-row .reps-stepper .step-btn {
    width: 40px; height: 38px;
    font-size: 20px;
    color: var(--accent);
    background: transparent;
    border: none;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
    cursor: pointer;
  }
  .set-row .reps-stepper .step-btn:active { background: var(--accent-dim); }
  .set-row .reps-stepper .step-val {
    flex: 1;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    min-width: 24px;
  }
  .set-row.editing .reps-stepper {
    background: white;
  }

  /* Bottom bar in workout */
  .workout-bottom {
    position: fixed;
    bottom: var(--safe-bottom);
    left: 0; right: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    z-index: 40;
  }
  .workout-bottom-inner { max-width: 640px; margin: 0 auto; }

  /* Setup */
  .day-editor {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .ex-editor {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 8px;
  }
  .ex-editor-top {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .ex-editor-top .exname { flex: 1; padding: 10px 12px; font-size: 15px; }
  .ex-editor-bottom {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }
  .ex-editor .remove {
    background: transparent;
    border: none;
    color: var(--danger);
    font-size: 22px;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    min-width: 36px;
    min-height: 36px;
  }
  .stepper-group {
    flex: 1;
    min-width: 0;
  }
  .stepper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px;
    min-width: 0;
  }
  .stepper.big { padding: 6px; }
  .stepper-label {
    display: block;
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 600;
    margin: 0 0 4px 4px;
  }
  .step-btn {
    width: 36px; height: 36px;
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 22px;
    font-weight: 600;
    cursor: pointer;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
  }
  .step-btn:active { background: var(--accent-dim); }
  .step-val {
    flex: 1;
    min-width: 28px;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  /* placeholder for old style — no longer used but kept harmless */
  .ex-editor-head {
    display: none;
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    padding: 0 4px;
  }

  /* Celebration */
  .celebrate {
    text-align: center;
    padding: 40px 20px;
  }
  .celebrate .big {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: var(--success);
    color: white;
    display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 44px;
    margin-bottom: 20px;
    animation: pop 0.4s ease-out;
  }
  .celebrate h1 { font-size: 32px; margin-bottom: 8px; }
  .celebrate .sub { color: var(--text-dim); margin-bottom: 24px; }
  .reward-row {
    display: flex; justify-content: center; gap: 12px;
    margin: 20px 0;
  }
  .reward {
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px 18px;
    box-shadow: var(--shadow);
    font-weight: 600;
    font-size: 15px;
    animation: slideup 0.5s ease-out;
  }
  .reward .label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; margin-bottom: 2px; }
  @keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  @keyframes slideup {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* History */
  .session-item {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
  }
  .session-item .session-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 6px;
  }
  .session-item .session-head .ttl { font-weight: 600; }
  .session-item details summary {
    cursor: pointer;
    color: var(--accent);
    font-size: 13px;
    list-style: none;
    margin-top: 8px;
  }
  .session-item details summary::-webkit-details-marker { display: none; }
  .session-item .ex-detail {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 14px;
  }
  .session-item .ex-detail .nm { font-weight: 500; }
  .session-item .ex-detail .sts { color: var(--text-dim); font-variant-numeric: tabular-nums; font-size: 13px; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty .ico {
    font-size: 56px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }
  .modal h3 { margin-bottom: 8px; }
  .modal p { color: var(--text-dim); margin: 0 0 20px; }
  .modal .btn-group { margin-top: 12px; }
  .modal-extra {
    display: block;
    margin: 16px auto 0;
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 14px;
    font-weight: 500;
    padding: 8px 12px;
    cursor: pointer;
  }
  .modal-extra.danger { color: var(--danger); }

  /* Misc */
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .badge {
    display: inline-block;
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 8px;
  }
  .badge.success { background: var(--success-dim); color: var(--success); }

  .program-summary .ex-line {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between;
    font-size: 14px;
  }
  .program-summary .ex-line:last-child { border-bottom: none; }
  .program-summary .ex-line .nm { font-weight: 500; }
  .program-summary .ex-line .tgt { color: var(--text-dim); font-variant-numeric: tabular-nums; }

  .week-pip {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    display: inline-flex;
    align-items: center; justify-content: center;
    font-variant-numeric: tabular-nums;
  }
  .week-pip.done { background: var(--success); color: white; border-color: var(--success); }
  .week-pip.current { background: var(--accent); color: white; border-color: var(--accent); }

  .day-check {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--success);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700;
    flex-shrink: 0;
  }
  .day-check.small { width: 22px; height: 22px; font-size: 13px; }

  .day-row {
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
  }
  .day-row.compact { cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
  .day-row.done {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    opacity: 0.75;
  }
  .day-row-head {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .day-row-main { flex: 1; min-width: 0; }
  .day-row-main .name { font-size: 16px; font-weight: 600; }
  .day-row-main .meta { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
  .chevron { color: var(--text-faint); font-size: 14px; }
  .day-row-detail {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .card-next {
    border: 2px solid var(--accent);
    box-shadow: 0 1px 2px rgba(0,113,227,0.08), 0 4px 12px rgba(0,113,227,0.12);
  }

  .version-stamp {
    text-align: center;
    color: var(--text-faint);
    font-size: 11px;
    margin: 32px 0 8px;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<div id="app"></div>
<nav id="tabs" hidden>
  <button class="tab" data-tab="today"><span class="ico">⌂</span><span>Today</span></button>
  <button class="tab" data-tab="program"><span class="ico">⚙</span><span>Settings</span></button>
  <button class="tab" data-tab="history"><span class="ico">◷</span><span>History</span></button>
</nav>

<script>
'use strict';

/* ---------- State ---------- */
const APP_VERSION = 'v10 · no double-tap zoom';
const STORAGE_KEY = 'wt-state-v2';
let saveErrorShown = false;
const DEFAULT_STATE = {
  program: null,        // { name, weeks: 8, template: [{ name, exercises: [{ name, sets, reps }] }] }
  sessions: [],         // [{ date, weekIndex, dayIndex, dayName, durationMs, exercises: [{ name, sets: [{ weight, reps, ts }] }] }]
  active: null,         // { weekIndex, dayIndex, dayName, startedAt, exercises: [...] }
  stats: { xp: 0, streak: 0, lastDayCompleteDate: null },
  currentRun: { startedAt: null, weekIndex: 0, completedDayIndices: [] },
  tab: 'today',
  celebration: null     // { type: 'workout', dayName, weekIndex, setCount, volume, xpEarned, leveledUp, fullyComplete, weekComplete, programComplete }
};

let state = load();
let setupDraft = null;  // { name, weeks, days: [...] } while editing in setup screen
let editingSet = null;  // { exIdx, setIdx } when a logged set is being edited
let expandedDayIdx = null;  // index of compact day-card whose detail is expanded on Today
let modal = null;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return migrate(Object.assign(structuredClone(DEFAULT_STATE), JSON.parse(raw)));
  } catch (e) { console.warn('load failed', e); }
  return structuredClone(DEFAULT_STATE);
}

function migrate(s) {
  if (!s.program) return s;
  // Old program shape: { name, days: [...] } → { name, weeks: 1, template: [...] }
  if (s.program.days && !s.program.template) {
    s.program = {
      name: s.program.name,
      weeks: 1,
      template: s.program.days
    };
  }
  // Normalize currentRun shape
  const cr = s.currentRun || {};
  const newCR = {
    startedAt: cr.startedAt || Date.now(),
    weekIndex: typeof cr.weekIndex === 'number' ? cr.weekIndex : 0,
    completedDayIndices: Array.isArray(cr.completedDayIndices) ? cr.completedDayIndices : []
  };
  // Migrate old completedDayCount → weekIndex/completedDayIndices
  if (typeof cr.completedDayCount === 'number' && !Array.isArray(cr.completedDayIndices)) {
    const dayCount = s.program.template.length;
    const fullWeeks = Math.floor(cr.completedDayCount / dayCount);
    const remainder = cr.completedDayCount % dayCount;
    newCR.weekIndex = fullWeeks;
    newCR.completedDayIndices = Array.from({ length: remainder }, (_, i) => i);
  }
  s.currentRun = newCR;
  // Ensure sessions have weekIndex
  if (Array.isArray(s.sessions)) {
    s.sessions.forEach(sess => { if (sess.weekIndex == null) sess.weekIndex = 0; });
  }
  return s;
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    // Verify it actually persisted (some browsers silently accept then drop)
    const check = localStorage.getItem(STORAGE_KEY);
    if (!check) throw new Error('write succeeded but read returned empty');
    return true;
  } catch (e) {
    console.error('save failed', e);
    if (!saveErrorShown) {
      saveErrorShown = true;
      showModal({
        title: 'Could not save your data',
        body: 'Your browser is blocking storage. Common causes: Private/Incognito mode, "Block All Cookies", or full storage. Your changes won\'t persist across reloads until this is fixed.\n\nError: ' + (e.message || String(e)),
        confirmText: 'OK',
        hideCancel: true,
        onConfirm: closeModal
      });
    }
    return false;
  }
}

function buzz(pattern) {
  // No-op on iOS Safari (Vibration API unsupported). Works on Android Chrome / many PWAs.
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) {}
}

function storageWorks() {
  try {
    const k = '__wt_test__';
    localStorage.setItem(k, '1');
    const ok = localStorage.getItem(k) === '1';
    localStorage.removeItem(k);
    return ok;
  } catch (e) {
    return false;
  }
}

function setState(patch) {
  Object.assign(state, patch);
  save();
  render();
}

/* ---------- Helpers ---------- */
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtNum = n => {
  if (n == null || isNaN(n)) return '–';
  const r = Math.round(n * 10) / 10;
  return r % 1 === 0 ? String(r) : r.toFixed(1);
};
const fmtDate = ts => {
  const d = new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  const isYesterday = d.toDateString() === yesterday.toDateString();
  if (sameDay) return 'Today';
  if (isYesterday) return 'Yesterday';
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
};
const daysBetween = (a, b) => {
  const d1 = new Date(new Date(a).toDateString());
  const d2 = new Date(new Date(b).toDateString());
  return Math.round((d2 - d1) / 86400000);
};

function totalVolume(exercises) {
  let v = 0;
  exercises.forEach(e => e.sets.forEach(s => v += (s.weight || 0) * (s.reps || 0)));
  return v;
}
function setCount(exercises) {
  return exercises.reduce((n, e) => n + e.sets.length, 0);
}
function levelFromXp(xp) {
  return Math.floor(Math.sqrt(xp / 100));
}
function xpForLevel(lvl) {
  return lvl * lvl * 100;
}

function findLastSet(exerciseName, setIndex) {
  for (let i = state.sessions.length - 1; i >= 0; i--) {
    const ex = state.sessions[i].exercises.find(e => e.name === exerciseName);
    if (ex && ex.sets[setIndex]) return ex.sets[setIndex];
  }
  return null;
}

function weightPrefillFor(ex, si) {
  // Set 2+: take the weight from the previous set in this workout
  if (si > 0 && ex.sets[si - 1]) return ex.sets[si - 1].weight;
  // Set 1: take the weight from the most recent matching set in history (if any)
  const last = findLastSet(ex.name, 0);
  return last ? last.weight : '';
}

function repsPrefillFor(ex, si) {
  // Set 2+: take the reps from the previous set in this workout
  if (si > 0 && ex.sets[si - 1]) return ex.sets[si - 1].reps;
  // Set 1: use the program's target reps
  return ex.targetReps;
}

function dayIsDoneThisWeek(dayIndex) {
  return state.currentRun.completedDayIndices.includes(dayIndex);
}

function nextDayIndex() {
  if (!state.program) return -1;
  for (let i = 0; i < state.program.template.length; i++) {
    if (!dayIsDoneThisWeek(i)) return i;
  }
  return -1;
}

function weekIsComplete() {
  return state.program && state.currentRun.completedDayIndices.length >= state.program.template.length;
}

function programIsComplete() {
  return state.program && state.currentRun.weekIndex >= state.program.weeks;
}

function sessionForDayThisWeek(dayIndex) {
  return state.sessions.slice().reverse().find(s =>
    s.weekIndex === state.currentRun.weekIndex && s.dayIndex === dayIndex
  );
}

/* ---------- Routing ---------- */
function pickView() {
  if (state.celebration) return 'celebration';
  if (!state.program || state.editing) return 'setup';
  if (state.active) return 'workout';
  return state.tab;
}

function render() {
  const view = pickView();
  const app = $('#app');
  const tabs = $('#tabs');
  let body = (Views[view] || Views.today)();
  if (view !== 'workout') {
    body += `<div class="version-stamp">${APP_VERSION}</div>`;
  }
  app.innerHTML = body;
  app.classList.toggle('fullscreen', view === 'workout');
  const showTabs = view === 'today' || view === 'program' || view === 'history';
  tabs.hidden = !showTabs;
  if (showTabs) {
    $$('.tab', tabs).forEach(t => t.classList.toggle('active', t.dataset.tab === state.tab));
  }
  if (modal) renderModal();
  // Scroll to top on view change (but not for active workout re-renders)
  if (view !== 'workout') window.scrollTo(0, 0);
}

/* ---------- Views ---------- */
const Views = {};

Views.setup = function() {
  if (!setupDraft) {
    setupDraft = state.program
      ? { name: state.program.name, weeks: state.program.weeks, days: structuredClone(state.program.template) }
      : { name: 'My Program', weeks: 8, days: [makeDay()] };
  }
  const suggestions = exerciseNameSuggestions();
  return `
    <datalist id="exercise-options">
      ${suggestions.map(n => `<option value="${esc(n)}">`).join('')}
    </datalist>

    <h1>${state.program ? 'Edit Program' : 'Build Your Program'}</h1>
    <p class="subtle">${state.program ? 'Changes apply going forward.' : 'Pick how many weeks the program runs, then add the days that repeat each week (e.g. Push, Pull, Legs). For each day, add exercises with target sets and reps. You\'ll log the weight during each workout.'}</p>

    <div style="margin-top:20px;">
      <label class="field">
        <span class="lbl">Program Name</span>
        <input type="text" id="prog-name" value="${esc(setupDraft.name)}" placeholder="e.g. 8-week Push/Pull/Legs">
      </label>
      <label class="field" style="max-width:200px;">
        <span class="lbl">Number of Weeks</span>
        <div class="stepper big" data-stepper-target="weeks">
          <button class="step-btn" data-step="-1" type="button">−</button>
          <span class="step-val" id="prog-weeks-val">${setupDraft.weeks}</span>
          <button class="step-btn" data-step="1" type="button">+</button>
        </div>
      </label>
    </div>

    <h2>Days each week</h2>
    <p class="subtle" style="margin-top:-8px;">These days repeat every week. You can do them in any order.</p>
    <div id="days">
      ${setupDraft.days.map((d, i) => dayEditorHtml(d, i)).join('')}
    </div>

    <button class="btn secondary" id="add-day" style="margin-top:8px;">+ Add Day</button>

    <div style="height:24px"></div>

    <button class="btn" id="save-program">${state.program ? 'Save Changes' : 'Start Program'}</button>
    ${state.program ? `<button class="btn ghost" id="cancel-setup" style="margin-top:8px;">Cancel</button>` : ''}
  `;
};

function makeDay() {
  return { name: '', exercises: [makeEx()] };
}
function makeEx() {
  return { name: '', sets: 3, reps: 8 };
}

function dayEditorHtml(day, i) {
  return `
    <div class="day-editor" data-day="${i}">
      <div class="row between" style="margin-bottom:12px;">
        <input type="text" class="day-name" value="${esc(day.name)}" placeholder="Day ${i + 1} name (e.g. Push)" style="font-weight:600;">
        ${setupDraft.days.length > 1 ? `<button class="btn icon" data-act="rm-day" title="Remove day">×</button>` : ''}
      </div>
      <div class="exercises">
        ${day.exercises.map((e, j) => exEditorHtml(e, j)).join('')}
      </div>
      <button class="btn ghost small" data-act="add-ex" style="margin-top:8px;">+ Add Exercise</button>
    </div>
  `;
}

function exEditorHtml(ex, j) {
  return `
    <div class="ex-editor" data-ex="${j}">
      <div class="ex-editor-top">
        <input type="text" class="exname" list="exercise-options" data-f="name" value="${esc(ex.name)}" placeholder="Exercise name">
        <button class="remove" data-act="rm-ex" title="Remove">×</button>
      </div>
      <div class="ex-editor-bottom">
        <div class="stepper-group">
          <span class="stepper-label">Sets</span>
          <div class="stepper" data-f="sets">
            <button class="step-btn" data-step="-1" type="button">−</button>
            <span class="step-val">${ex.sets}</span>
            <button class="step-btn" data-step="1" type="button">+</button>
          </div>
        </div>
        <div class="stepper-group">
          <span class="stepper-label">Reps</span>
          <div class="stepper" data-f="reps">
            <button class="step-btn" data-step="-1" type="button">−</button>
            <span class="step-val">${ex.reps}</span>
            <button class="step-btn" data-step="1" type="button">+</button>
          </div>
        </div>
      </div>
    </div>
  `;
};

function exerciseNameSuggestions() {
  const set = new Set();
  state.sessions.forEach(s => s.exercises.forEach(e => { if (e.name) set.add(e.name); }));
  if (state.program) {
    state.program.template.forEach(d => d.exercises.forEach(e => { if (e.name) set.add(e.name); }));
  }
  return Array.from(set).sort((a, b) => a.localeCompare(b));
}

Views.today = function() {
  if (programIsComplete()) {
    return programCompleteView();
  }
  const lvl = levelFromXp(state.stats.xp);
  const program = state.program;
  const week = state.currentRun.weekIndex;
  const totalWeeks = program.weeks;
  const template = program.template;
  const doneCount = state.currentRun.completedDayIndices.length;
  const overallDone = week * template.length + doneCount;
  const overallTotal = totalWeeks * template.length;
  const overallPct = (overallDone / overallTotal * 100).toFixed(0);

  // Order cards: next-up first, other undone, then done last
  const nextIdx = nextDayIndex();
  const order = [];
  if (nextIdx >= 0) order.push(nextIdx);
  template.forEach((_, i) => { if (i !== nextIdx && !dayIsDoneThisWeek(i)) order.push(i); });
  template.forEach((_, i) => { if (dayIsDoneThisWeek(i)) order.push(i); });

  return `
    <div class="row between" style="align-items:baseline;">
      <h1>Today</h1>
      <button class="btn ghost small" id="edit-program">Edit program</button>
    </div>
    <p class="subtle">${esc(program.name)} · Week ${week + 1} of ${totalWeeks} · ${doneCount} of ${template.length} done</p>

    <div class="stats" style="grid-template-columns: 1fr 1fr;">
      <div class="stat"><div class="v">🔥 ${state.stats.streak}</div><div class="k">Streak</div></div>
      <div class="stat"><div class="v">Lv ${lvl}</div><div class="k">${state.stats.xp} XP</div></div>
    </div>

    <div class="progress-bar" style="margin: 18px 0 4px;">
      <div class="fill" style="width:${overallPct}%"></div>
    </div>
    <p class="subtle mono" style="margin: 0 0 20px; font-size: 12px;">${overallPct}% of program complete</p>

    ${order.map(i => dayCardHtml(template[i], i)).join('')}
  `;
};

function dayCardHtml(day, i) {
  const done = dayIsDoneThisWeek(i);
  const isNext = !done && nextDayIndex() === i;
  const isExpanded = expandedDayIdx === i;
  const session = done ? sessionForDayThisWeek(i) : null;
  const exCount = day.exercises.length;
  const setCount = day.exercises.reduce((n, e) => n + e.sets, 0);

  const exList = `
    <div style="margin:10px 0 4px;">
      ${day.exercises.map(e => `
        <div class="row" style="padding:3px 0; font-size:14px;">
          <span class="faint mono" style="min-width:60px;">${e.sets}×${e.reps}</span>
          <span style="flex:1;">${esc(e.name)}</span>
        </div>
      `).join('')}
    </div>
  `;

  if (done) {
    return `
      <div class="day-row done">
        <div class="day-check small">✓</div>
        <div class="day-row-main">
          <div class="name">${esc(day.name)}</div>
          <div class="meta">${session ? 'Done ' + fmtDate(session.date) : 'Done'}</div>
        </div>
      </div>
    `;
  }

  if (isNext) {
    return `
      <div class="card card-next">
        <div class="row between" style="margin-bottom:6px;">
          <div>
            <div class="subtle">Next up</div>
            <h3>${esc(day.name)}</h3>
          </div>
          <span class="badge">${exCount} ex · ${setCount} sets</span>
        </div>
        ${exList}
        <button class="btn" data-start-day="${i}" style="margin-top:12px;">Start ${esc(day.name)}</button>
      </div>
    `;
  }

  // Other undone: compact, tap to expand exercises
  return `
    <div class="day-row compact ${isExpanded ? 'expanded' : ''}" data-expand-day="${i}">
      <div class="day-row-head">
        <div class="day-row-main">
          <div class="name">${esc(day.name)}</div>
          <div class="meta">${exCount} ex · ${setCount} sets</div>
        </div>
        <span class="chevron" aria-hidden="true">${isExpanded ? '▾' : '▸'}</span>
        <button class="btn secondary small" data-start-day="${i}">Start</button>
      </div>
      ${isExpanded ? `<div class="day-row-detail">${exList}</div>` : ''}
    </div>
  `;
}

function programCompleteView() {
  return `
    <div class="celebrate">
      <div class="big">🏆</div>
      <h1>Program Complete!</h1>
      <p class="sub">You finished all ${state.program.weeks} weeks of ${esc(state.program.name)}.</p>
      <div class="stats" style="max-width:320px; margin:24px auto;">
        <div class="stat"><div class="v">${state.stats.xp}</div><div class="k">Total XP</div></div>
        <div class="stat"><div class="v">Lv ${levelFromXp(state.stats.xp)}</div><div class="k">Level</div></div>
        <div class="stat"><div class="v">${state.sessions.length}</div><div class="k">Workouts</div></div>
      </div>
      <button class="btn" id="restart-program">Start Program Again</button>
      <button class="btn ghost" id="edit-program" style="margin-top:8px;">Edit Program</button>
    </div>
  `;
}

Views.program = function() {
  const p = state.program;
  const week = state.currentRun.weekIndex;
  const totalWeeks = p.weeks;
  return `
    <h1>Settings</h1>

    <h2>Program</h2>
    <div class="card">
      <div class="row between" style="margin-bottom:10px;">
        <div>
          <h3>${esc(p.name)}</h3>
          <div class="subtle">${p.weeks} week${p.weeks === 1 ? '' : 's'} · ${p.template.length} day${p.template.length === 1 ? '' : 's'} each week</div>
        </div>
        <button class="btn small secondary" id="edit-program">Edit</button>
      </div>
      <div class="program-summary">
        ${p.template.map((d, i) => `
          <div style="margin-top:${i === 0 ? '0' : '16px'};">
            <div class="row between" style="margin-bottom:6px;">
              <strong>${i + 1}. ${esc(d.name || 'Day ' + (i + 1))}</strong>
              ${dayIsDoneThisWeek(i) ? `<span class="badge success">Done this week</span>` : ''}
            </div>
            ${d.exercises.map(e => `
              <div class="ex-line">
                <span class="nm">${esc(e.name)}</span>
                <span class="tgt">${e.sets} × ${e.reps}</span>
              </div>
            `).join('')}
          </div>
        `).join('')}
      </div>
    </div>

    <h2>Progress</h2>
    <div class="card">
      <div class="subtle" style="margin-bottom:10px;">Currently on Week ${Math.min(week + 1, totalWeeks)} of ${totalWeeks}</div>
      <div class="row wrap" style="gap:6px;">
        ${Array.from({length: totalWeeks}, (_, i) => {
          const done = i < week;
          const cur = i === week;
          return `<div class="week-pip ${done ? 'done' : ''} ${cur ? 'current' : ''}" title="Week ${i+1}">${i + 1}</div>`;
        }).join('')}
      </div>
    </div>

    <h2>Danger zone</h2>
    <button class="btn ghost" id="reset-program" style="color: var(--danger);">Reset Program & History</button>
  `;
};

Views.history = function() {
  if (!state.sessions.length) {
    return `
      <h1>History</h1>
      <div class="empty">
        <div class="ico">◷</div>
        <div>No workouts logged yet.</div>
        <div class="faint" style="margin-top:8px;">Complete a workout to see it here.</div>
      </div>
    `;
  }
  const sorted = state.sessions.slice().sort((a, b) => b.date - a.date);
  return `
    <h1>History</h1>
    <p class="subtle">${state.sessions.length} workout${state.sessions.length === 1 ? '' : 's'} completed</p>
    <div style="margin-top:16px;">
    ${sorted.map((s, idx) => `
      <div class="session-item">
        <div class="session-head">
          <span class="ttl">${esc(s.dayName || 'Day ' + (s.dayIndex + 1))}</span>
          <span class="subtle">${fmtDate(s.date)}</span>
        </div>
        <div class="subtle mono">Week ${(s.weekIndex ?? 0) + 1} · ${setCount(s.exercises)} sets · ${fmtNum(totalVolume(s.exercises))} kg total volume</div>
        <details>
          <summary>View details</summary>
          ${s.exercises.map(e => `
            <div class="ex-detail">
              <div class="row between">
                <span class="nm">${esc(e.name)}</span>
                <span class="sts">${e.sets.length} set${e.sets.length === 1 ? '' : 's'}</span>
              </div>
              <div class="sts" style="margin-top:4px;">
                ${e.sets.map(st => `${fmtNum(st.weight)}kg × ${st.reps}`).join(' · ')}
              </div>
            </div>
          `).join('')}
        </details>
      </div>
    `).join('')}
    </div>
  `;
};

Views.workout = function() {
  const a = state.active;
  const totalEx = a.exercises.length;
  const currentExIdx = a.exercises.findIndex(e => e.sets.length < e.targetSets);
  const allDone = currentExIdx === -1;
  const doneCount = a.exercises.filter(e => e.sets.length >= e.targetSets).length;

  return `
    <div class="workout-top">
      <div class="row">
        <div>
          <div class="subtle">Week ${a.weekIndex + 1} · ${esc(a.dayName)}</div>
        </div>
      </div>
      <div class="dots">
        ${a.exercises.map((e, i) => {
          const done = e.sets.length >= e.targetSets;
          const cur = i === currentExIdx;
          return `<div class="dot ${done ? 'done' : ''} ${cur ? 'current' : ''}" data-jump="${i}"></div>`;
        }).join('')}
      </div>
    </div>

    ${a.exercises.map((e, i) => exerciseCardHtml(e, i, currentExIdx)).join('')}

    <div class="workout-bottom">
      <div class="workout-bottom-inner">
        <div class="row between" style="align-items:center; gap:12px;">
          <span class="subtle" style="white-space:nowrap;">${doneCount} of ${totalEx} complete</span>
          <button class="btn ${allDone ? 'success' : ''}" id="finish-workout" style="flex:1; max-width:200px;">${allDone ? 'Finish Workout ✓' : 'Finish'}</button>
        </div>
      </div>
    </div>
  `;
};

function exerciseCardHtml(ex, i, currentExIdx) {
  const done = ex.sets.length >= ex.targetSets;
  const pending = !done && i !== currentExIdx;
  const isCurrent = i === currentExIdx;

  let cardClass = 'ex-card';
  if (done) cardClass += ' done';
  if (pending) cardClass += ' pending';

  if (done) {
    return `
      <div class="${cardClass}" data-ex-idx="${i}">
        <div class="ex-header">
          <div class="name">${esc(ex.name)}</div>
          <div class="progress mono">${ex.sets.length}/${ex.targetSets}</div>
          <div class="check">✓</div>
        </div>
        <div class="ex-summary">${ex.sets.map(s => `${fmtNum(s.weight)}×${s.reps}`).join(' · ')}</div>
      </div>
    `;
  }

  return `
    <div class="${cardClass}" data-ex-idx="${i}">
      <div class="ex-header">
        <div class="name">${esc(ex.name)}</div>
        <div class="progress mono">${ex.sets.length}/${ex.targetSets}</div>
      </div>
      <div class="ex-target">Target: ${ex.targetSets} × ${ex.targetReps}</div>
      <div class="sets">
        ${Array.from({length: ex.targetSets}, (_, si) => setRowHtml(ex, i, si, isCurrent)).join('')}
      </div>
    </div>
  `;
}

function setRowHtml(ex, exIdx, si, isCurrentEx) {
  const logged = ex.sets[si];
  const isEditing = !!logged && editingSet && editingSet.exIdx === exIdx && editingSet.setIdx === si;
  const isActive = isCurrentEx && !logged && si === ex.sets.length;
  const isPending = !logged && !isActive;

  if (isEditing) {
    return `
      <div class="set-row editing" data-set-idx="${si}">
        <span class="lbl">${si + 1}</span>
        <input type="tel" inputmode="decimal" class="set-w" value="${logged.weight}" autocomplete="off" maxlength="6">
        ${repsStepperHtml(logged.reps)}
        <div class="edit-actions">
          <button class="log-btn" data-act="save-edit" title="Save">✓</button>
          <button class="cancel-btn" data-act="cancel-edit" title="Cancel">×</button>
        </div>
      </div>
    `;
  }

  if (logged) {
    return `
      <div class="set-row logged" data-edit-set="${exIdx},${si}">
        <span class="lbl">${si + 1} ✓</span>
        <span class="val">${fmtNum(logged.weight)} kg</span>
        <span class="val">× ${logged.reps}</span>
        <span class="edit-set-btn" aria-hidden="true">✎</span>
      </div>
    `;
  }

  if (isPending) {
    return `
      <div class="set-row pending">
        <span class="lbl">${si + 1}</span>
        <span class="val">– kg</span>
        <span class="val">× –</span>
        <span></span>
      </div>
    `;
  }

  // Active row — prefilled where possible
  const wPrefill = weightPrefillFor(ex, si);
  const rPrefill = repsPrefillFor(ex, si);
  const wHasValue = wPrefill !== '' && !isNaN(parseFloat(wPrefill));
  const last = findLastSet(ex.name, si);
  return `
    <div class="set-row active" data-set-idx="${si}">
      <span class="lbl">${si + 1}</span>
      <input type="tel" inputmode="decimal" class="set-w" value="${wHasValue ? wPrefill : ''}" placeholder="kg" autocomplete="off" maxlength="6">
      ${repsStepperHtml(rPrefill)}
      <button class="log-btn"${wHasValue ? '' : ' disabled'}>✓</button>
      ${last ? `
        <div class="last-ref">
          <span class="last-chip static">Last: ${fmtNum(last.weight)} kg × ${last.reps}</span>
        </div>
      ` : ''}
    </div>
  `;
}

function repsStepperHtml(value) {
  return `
    <div class="reps-stepper">
      <button class="step-btn" data-step="-1" type="button">−</button>
      <span class="step-val">${value}</span>
      <button class="step-btn" data-step="1" type="button">+</button>
      <input type="hidden" class="set-r" value="${value}">
    </div>
  `;
}

Views.celebration = function() {
  const c = state.celebration;
  if (c.type !== 'workout') return '';

  let headline, icon, iconBg, sub;
  if (c.programComplete) {
    headline = 'Program Complete!';
    icon = '🏆';
    iconBg = 'var(--accent)';
    sub = `You finished all ${state.program.weeks} weeks of ${esc(state.program.name)}.`;
  } else if (c.weekComplete) {
    headline = `Week ${c.weekIndex + 1} Done!`;
    icon = '🎉';
    iconBg = 'var(--accent)';
    sub = `All ${state.program.template.length} days complete · ${c.setCount} sets · ${fmtNum(c.volume)} kg`;
  } else if (c.fullyComplete) {
    headline = `${esc(c.dayName)} Done!`;
    icon = '✓';
    iconBg = 'var(--success)';
    sub = `Week ${c.weekIndex + 1} · ${c.setCount} sets · ${fmtNum(c.volume)} kg total volume`;
  } else {
    headline = 'Workout Saved';
    icon = '◐';
    iconBg = 'var(--warn)';
    sub = `${c.setCount} sets · ${fmtNum(c.volume)} kg · day not yet complete`;
  }

  return `
    <div class="celebrate">
      <div class="big" style="background:${iconBg};">${icon}</div>
      <h1>${headline}</h1>
      <p class="sub">${sub}</p>
      <div class="reward-row">
        <div class="reward"><span class="label">XP Earned</span>+${c.xpEarned}</div>
        ${c.fullyComplete ? `<div class="reward"><span class="label">Streak</span>🔥 ${state.stats.streak}</div>` : ''}
      </div>
      ${c.leveledUp ? `<div class="reward" style="display:inline-block; margin:8px auto 20px; background: var(--accent); color: white;"><span class="label" style="color:rgba(255,255,255,0.8);">Level Up!</span>Level ${levelFromXp(state.stats.xp)}</div>` : ''}
      <button class="btn" id="celebrate-continue" style="max-width:280px; margin:24px auto 0;">${c.programComplete ? 'See Program' : 'Continue'}</button>
    </div>
  `;
};

/* ---------- Event handling ---------- */
function bindGlobalEvents() {
  document.addEventListener('click', onClick);
  document.addEventListener('input', onInput);
  document.addEventListener('keydown', onKeydown);
  document.addEventListener('focusin', onFocusIn);
}

function onFocusIn(e) {
  // Select the prefilled weight on focus so it can be overtyped immediately.
  if (e.target.classList && e.target.classList.contains('set-w') && e.target.value) {
    setTimeout(() => { try { e.target.select(); } catch (_) {} }, 0);
  }
}

function onClick(e) {
  const t = e.target.closest('[data-tab]');
  if (t) {
    setState({ tab: t.dataset.tab });
    return;
  }

  // Setup screen
  if (e.target.classList.contains('step-btn')) {
    if (e.target.closest('.set-row')) {
      handleRepsStepperClick(e.target);
    } else {
      handleStepperClick(e.target);
    }
    return;
  }
  if (e.target.id === 'add-day') {
    setupDraft.days.push(makeDay());
    rerenderSetup();
    return;
  }
  if (e.target.dataset.act === 'rm-day') {
    const di = +e.target.closest('[data-day]').dataset.day;
    setupDraft.days.splice(di, 1);
    rerenderSetup();
    return;
  }
  if (e.target.dataset.act === 'add-ex') {
    const di = +e.target.closest('[data-day]').dataset.day;
    setupDraft.days[di].exercises.push(makeEx());
    rerenderSetup();
    return;
  }
  if (e.target.dataset.act === 'rm-ex') {
    const di = +e.target.closest('[data-day]').dataset.day;
    const ej = +e.target.closest('[data-ex]').dataset.ex;
    setupDraft.days[di].exercises.splice(ej, 1);
    if (setupDraft.days[di].exercises.length === 0) {
      setupDraft.days[di].exercises.push(makeEx());
    }
    rerenderSetup();
    return;
  }
  if (e.target.id === 'save-program') {
    saveSetup();
    return;
  }
  if (e.target.id === 'cancel-setup') {
    setupDraft = null;
    state.editing = false;
    setState({ tab: 'program' });
    return;
  }

  // Today
  if (e.target.dataset.startDay != null) {
    startWorkout(parseInt(e.target.dataset.startDay, 10));
    return;
  }
  const expandEl = e.target.closest && e.target.closest('[data-expand-day]');
  if (expandEl && !e.target.closest('[data-start-day]')) {
    const i = parseInt(expandEl.dataset.expandDay, 10);
    expandedDayIdx = (expandedDayIdx === i) ? null : i;
    render();
    return;
  }
  if (e.target.id === 'restart-program') {
    showModal({
      title: 'Start program over?',
      body: 'Your week progress will reset to Week 1. History stays intact.',
      confirmText: 'Restart',
      onConfirm: () => {
        state.currentRun = { startedAt: Date.now(), weekIndex: 0, completedDayIndices: [] };
        closeModal();
        setState({});
      }
    });
    return;
  }

  // Program tab
  if (e.target.id === 'edit-program') {
    setupDraft = {
      name: state.program.name,
      weeks: state.program.weeks,
      days: structuredClone(state.program.template)
    };
    state.editing = true;
    save();
    render();
    return;
  }
  if (e.target.id === 'reset-program') {
    showModal({
      title: 'Reset everything?',
      body: 'This deletes your program, all logged workouts, XP, and streak. Cannot be undone.',
      confirmText: 'Delete All',
      danger: true,
      onConfirm: () => {
        state = structuredClone(DEFAULT_STATE);
        setupDraft = null;
        closeModal();
        setState({});
      }
    });
    return;
  }

  // Workout
  if (e.target.id === 'finish-workout') {
    endWorkoutFlow();
    return;
  }
  const editEl = e.target.closest && e.target.closest('[data-edit-set]');
  if (editEl) {
    const [exIdx, setIdx] = editEl.dataset.editSet.split(',').map(Number);
    editingSet = { exIdx, setIdx };
    render();
    return;
  }
  if (e.target.dataset.act === 'save-edit') {
    saveEditedSet(e.target.closest('.set-row'));
    return;
  }
  if (e.target.dataset.act === 'cancel-edit') {
    editingSet = null;
    render();
    return;
  }
  if (e.target.classList.contains('log-btn')) {
    logCurrentSet(e.target.closest('.set-row'));
    return;
  }
  if (e.target.classList.contains('dot') && e.target.dataset.jump != null) {
    const idx = +e.target.dataset.jump;
    const card = document.querySelector(`[data-ex-idx="${idx}"]`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }

  if (e.target.id === 'celebrate-continue') {
    state.celebration = null;
    save();
    render();
    return;
  }

  // Modal
  if (e.target.classList.contains('modal-backdrop')) {
    closeModal();
    return;
  }
  if (e.target.id === 'modal-cancel') {
    closeModal();
    return;
  }
  if (e.target.id === 'modal-confirm') {
    const fn = modal && modal.onConfirm;
    if (fn) fn();
    return;
  }
  if (e.target.id === 'modal-extra') {
    const fn = modal && modal.extraAction && modal.extraAction.onClick;
    if (fn) fn();
    return;
  }
}

function onInput(e) {
  // Setup live edits
  if (e.target.id === 'prog-name') {
    setupDraft.name = e.target.value;
    return;
  }
  if (e.target.classList.contains('day-name')) {
    const di = +e.target.closest('[data-day]').dataset.day;
    setupDraft.days[di].name = e.target.value;
    return;
  }
  if (e.target.matches('.ex-editor input[data-f]')) {
    const di = +e.target.closest('[data-day]').dataset.day;
    const ej = +e.target.closest('[data-ex]').dataset.ex;
    const field = e.target.dataset.f;
    const val = field === 'name' ? e.target.value : parseFloat(e.target.value) || 0;
    setupDraft.days[di].exercises[ej][field] = val;
    return;
  }

  // Workout set inputs
  if (e.target.classList.contains('set-w') || e.target.classList.contains('set-r')) {
    updateLogBtn(e.target.closest('.set-row'));
    return;
  }
}

function onKeydown(e) {
  if (e.key === 'Enter') {
    const editRow = e.target.closest && e.target.closest('.set-row.editing');
    if (editRow) {
      e.preventDefault();
      saveEditedSet(editRow);
      return;
    }
    const row = e.target.closest && e.target.closest('.set-row.active');
    if (row) {
      e.preventDefault();
      const btn = row.querySelector('.log-btn');
      if (btn && !btn.disabled) logCurrentSet(row);
    }
  }
  if (e.key === 'Escape') {
    if (editingSet) {
      editingSet = null;
      render();
      return;
    }
    if (modal) closeModal();
  }
}

function updateLogBtn(row) {
  if (!row) return;
  const w = parseFloat(row.querySelector('.set-w').value);
  const r = parseInt(row.querySelector('.set-r').value, 10);
  const ok = !isNaN(w) && w >= 0 && !isNaN(r) && r > 0;
  row.querySelector('.log-btn').disabled = !ok;
}

function rerenderSetup() {
  const app = $('#app');
  app.innerHTML = Views.setup();
}

function handleRepsStepperClick(btn) {
  const row = btn.closest('.set-row');
  if (!row) return;
  const hidden = row.querySelector('.set-r');
  const display = row.querySelector('.reps-stepper .step-val');
  if (!hidden || !display) return;
  const delta = parseInt(btn.dataset.step, 10);
  const cur = parseInt(hidden.value, 10) || 0;
  const next = clampStepper(cur + delta, 1, 100);
  hidden.value = next;
  display.textContent = next;
  updateLogBtn(row);
}

function handleStepperClick(btn) {
  const delta = parseInt(btn.dataset.step, 10);
  const stepper = btn.closest('.stepper');
  if (!stepper) return;
  // Program-level stepper (weeks)
  if (stepper.dataset.stepperTarget === 'weeks') {
    setupDraft.weeks = clampStepper(setupDraft.weeks + delta, 1, 52);
    rerenderSetup();
    return;
  }
  // Per-exercise stepper (sets or reps)
  const field = stepper.dataset.f;
  if (!field) return;
  const dayEl = btn.closest('[data-day]');
  const exEl = btn.closest('[data-ex]');
  if (!dayEl || !exEl) return;
  const di = +dayEl.dataset.day;
  const ei = +exEl.dataset.ex;
  const max = field === 'sets' ? 20 : 100;
  const ex = setupDraft.days[di].exercises[ei];
  ex[field] = clampStepper((ex[field] || 1) + delta, 1, max);
  rerenderSetup();
}

function clampStepper(n, lo, hi) {
  return Math.max(lo, Math.min(hi, n));
}

function saveSetup() {
  setupDraft.name = (setupDraft.name || '').trim() || 'My Program';
  // Validate: at least one day, each day has at least one exercise with a name
  const cleanDays = setupDraft.days
    .map(d => ({
      name: (d.name || '').trim(),
      exercises: d.exercises
        .filter(e => (e.name || '').trim())
        .map(e => ({
          name: e.name.trim(),
          sets: Math.max(1, parseInt(e.sets) || 1),
          reps: Math.max(1, parseInt(e.reps) || 1)
        }))
    }))
    .filter(d => d.exercises.length > 0);

  if (!cleanDays.length) {
    showModal({
      title: 'Add an exercise',
      body: 'Your program needs at least one day with at least one exercise.',
      confirmText: 'OK',
      hideCancel: true,
      onConfirm: closeModal
    });
    return;
  }

  cleanDays.forEach((d, i) => { if (!d.name) d.name = 'Day ' + (i + 1); });

  const weeks = Math.max(1, parseInt(setupDraft.weeks) || 1);
  const wasEditing = state.editing;
  state.program = { name: setupDraft.name, weeks, template: cleanDays };
  state.editing = false;
  if (!wasEditing) {
    state.currentRun = { startedAt: Date.now(), weekIndex: 0, completedDayIndices: [] };
  } else {
    // Cap weekIndex and completedDayIndices if program shrunk
    state.currentRun.weekIndex = Math.min(state.currentRun.weekIndex, weeks);
    state.currentRun.completedDayIndices = state.currentRun.completedDayIndices.filter(i => i < cleanDays.length);
  }
  setupDraft = null;
  state.tab = 'today';
  save();
  render();
}

/* ---------- Workout actions ---------- */
function startWorkout(dayIndex) {
  if (programIsComplete()) return;
  if (dayIsDoneThisWeek(dayIndex)) return;
  const day = state.program.template[dayIndex];
  if (!day) return;
  editingSet = null;
  expandedDayIdx = null;
  state.active = {
    weekIndex: state.currentRun.weekIndex,
    dayIndex,
    dayName: day.name || ('Day ' + (dayIndex + 1)),
    startedAt: Date.now(),
    exercises: day.exercises.map(e => ({
      name: e.name,
      targetSets: e.sets,
      targetReps: e.reps,
      sets: []
    }))
  };
  save();
  render();
}

function endWorkoutFlow() {
  const a = state.active;
  if (!a) return;
  const fullyComplete = a.exercises.every(e => e.sets.length >= e.targetSets);
  const anyLogged = a.exercises.some(e => e.sets.length > 0);

  if (fullyComplete) {
    finishWorkout();
    return;
  }

  if (!anyLogged) {
    showModal({
      title: 'Discard workout?',
      body: 'You haven\'t logged any sets yet.',
      confirmText: 'Discard',
      danger: true,
      onConfirm: () => {
        state.active = null;
        editingSet = null;
        closeModal();
        setState({});
      }
    });
    return;
  }

  // Partial — give the choice between Save & End and Discard
  showModal({
    title: 'Save your progress?',
    body: 'You haven\'t finished every exercise. Save what you\'ve done so far, or discard the workout?',
    confirmText: 'Save & End',
    onConfirm: () => {
      finishWorkout({ partial: true });
      closeModal();
    },
    extraAction: {
      label: 'Discard workout',
      danger: true,
      onClick: () => {
        state.active = null;
        editingSet = null;
        closeModal();
        setState({});
      }
    }
  });
}

function saveEditedSet(row) {
  if (!row || !state.active || !editingSet) return;
  const w = parseFloat(row.querySelector('.set-w').value);
  const r = parseInt(row.querySelector('.set-r').value, 10);
  if (isNaN(w) || isNaN(r) || r <= 0 || w < 0) return;
  const ex = state.active.exercises[editingSet.exIdx];
  const existing = ex.sets[editingSet.setIdx];
  if (!existing) { editingSet = null; render(); return; }
  ex.sets[editingSet.setIdx] = { ...existing, weight: w, reps: r };
  editingSet = null;
  save();
  render();
}

function logCurrentSet(row) {
  if (!row || !state.active) return;
  const w = parseFloat(row.querySelector('.set-w').value);
  const r = parseInt(row.querySelector('.set-r').value, 10);
  if (isNaN(w) || isNaN(r) || r <= 0) return;
  const card = row.closest('.ex-card');
  const exIdx = +card.dataset.exIdx;
  const ex = state.active.exercises[exIdx];
  ex.sets.push({ weight: w, reps: r, ts: Date.now() });
  const exJustCompleted = ex.sets.length === ex.targetSets;
  buzz(exJustCompleted ? [20, 40, 20] : 12);
  save();
  render();
  // After render, focus the next active input if there is one
  requestAnimationFrame(() => {
    const next = document.querySelector('.set-row.active .set-w');
    if (next && document.activeElement !== next) {
      // Auto-focus only on same-exercise advance, to avoid hijacking when an exercise finishes
      const stillSameEx = ex.sets.length < ex.targetSets;
      if (stillSameEx) next.focus();
      else {
        const nextCard = document.querySelector('.ex-card:not(.done):not(.pending)');
        if (nextCard) nextCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }
  });
}

function finishWorkout(opts = {}) {
  const a = state.active;
  if (!a) return;
  const exsWithSets = a.exercises.filter(e => e.sets.length > 0);
  if (!exsWithSets.length) {
    state.active = null;
    editingSet = null;
    save();
    render();
    return;
  }

  const session = {
    date: Date.now(),
    weekIndex: a.weekIndex,
    dayIndex: a.dayIndex,
    dayName: a.dayName,
    durationMs: Date.now() - a.startedAt,
    exercises: exsWithSets.map(e => ({ name: e.name, sets: e.sets }))
  };
  state.sessions.push(session);

  // Determine if day is fully complete
  const fullyComplete = !opts.partial &&
    a.exercises.every(e => e.sets.length >= e.targetSets);

  let xpEarned = 0;
  let weekComplete = false;
  let programComplete = false;
  const prevLvl = levelFromXp(state.stats.xp);

  // XP per set
  exsWithSets.forEach(e => { xpEarned += e.sets.length * 10; });
  // Exercise complete bonus
  exsWithSets.forEach(e => {
    if (e.sets.length >= e.targetSets) xpEarned += 25;
  });

  if (fullyComplete) {
    xpEarned += 100;

    // Streak (per workout day)
    const today = Date.now();
    const last = state.stats.lastDayCompleteDate;
    if (last) {
      const gap = daysBetween(last, today);
      if (gap === 0) {
        // same day, no change
      } else if (gap <= 2) {
        state.stats.streak += 1;
      } else {
        state.stats.streak = 1;
      }
    } else {
      state.stats.streak = 1;
    }
    state.stats.lastDayCompleteDate = today;

    // Mark this day done this week (if not already)
    if (!state.currentRun.completedDayIndices.includes(a.dayIndex)) {
      state.currentRun.completedDayIndices.push(a.dayIndex);
    }

    // Week complete?
    if (state.currentRun.completedDayIndices.length >= state.program.template.length) {
      weekComplete = true;
      xpEarned += 500;
      state.currentRun.weekIndex += 1;
      state.currentRun.completedDayIndices = [];

      // Program complete?
      if (programIsComplete()) {
        programComplete = true;
        xpEarned += 2500;
      }
    }
  }

  state.stats.xp += xpEarned;
  const leveledUp = levelFromXp(state.stats.xp) > prevLvl;

  state.celebration = {
    type: 'workout',
    dayName: a.dayName,
    weekIndex: a.weekIndex,
    setCount: setCount(exsWithSets),
    volume: totalVolume(exsWithSets),
    xpEarned,
    leveledUp,
    fullyComplete,
    weekComplete,
    programComplete
  };
  if (programComplete) buzz([80, 60, 80, 60, 80, 60, 200]);
  else if (weekComplete) buzz([60, 80, 60, 80, 60]);
  else if (fullyComplete) buzz([30, 60, 30]);
  state.active = null;
  editingSet = null;
  save();
  render();
}

/* ---------- Modal ---------- */
function showModal(cfg) {
  modal = cfg;
  renderModal();
}
function closeModal() {
  modal = null;
  const el = document.getElementById('modal-root');
  if (el) el.remove();
}
function renderModal() {
  let root = document.getElementById('modal-root');
  if (!root) {
    root = document.createElement('div');
    root.id = 'modal-root';
    document.body.appendChild(root);
  }
  root.innerHTML = `
    <div class="modal-backdrop">
      <div class="modal">
        <h3>${esc(modal.title)}</h3>
        ${modal.body ? `<p>${esc(modal.body)}</p>` : ''}
        <div class="btn-group">
          ${modal.hideCancel ? '' : `<button class="btn secondary" id="modal-cancel">Cancel</button>`}
          <button class="btn" id="modal-confirm" style="${modal.danger ? 'background: var(--danger);' : ''}">${esc(modal.confirmText || 'OK')}</button>
        </div>
        ${modal.extraAction ? `<button class="modal-extra ${modal.extraAction.danger ? 'danger' : ''}" id="modal-extra">${esc(modal.extraAction.label)}</button>` : ''}
      </div>
    </div>
  `;
}

/* ---------- Boot ---------- */
bindGlobalEvents();
render();

if (!storageWorks()) {
  showModal({
    title: 'Storage is disabled',
    body: 'This browser isn\'t letting the app save anything to local storage. The most common cause is Private/Incognito mode. Open this URL in a regular browser tab and add it to your home screen from there.',
    confirmText: 'OK',
    hideCancel: true,
    onConfirm: closeModal
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
</body>
</html>
